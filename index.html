<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>揪你瑜珈 · 線上預約系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;background:#f5f0e8;color:#1a1a1a;font-size:15px}
:root{
  --sg:#4a7c59;--sgl:#e8f0ea;--sgm:#7fa88a;--sgd:#2d5a3d;
  --wm:#f5f0e8;--wm2:#ede5d8;--wm3:#d4c9b5;
  --t1:#1a1a1a;--t2:#6b7280;
  --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.18);
  --bg1:#ffffff;--bg2:#f9f7f4;
  --radius:8px;--radius-lg:12px
}
.page{display:none}.page.active{display:block}
.login-wrap{background:var(--wm);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius-lg);padding:2rem;width:360px;max-width:100%}
.logo-circle{width:58px;height:58px;background:var(--sgd);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:#fff;font-size:26px}
.fg{margin-bottom:12px}
.fg label{font-size:12px;color:var(--t2);display:block;margin-bottom:4px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1px solid var(--bd);border-radius:var(--radius);font-size:14px;background:var(--bg1);color:var(--t1);font-family:inherit;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--sg);box-shadow:0 0 0 3px rgba(74,124,89,.12)}
.btn-p{background:var(--sgd);color:#fff;border:none;border-radius:var(--radius);padding:10px 20px;font-size:14px;cursor:pointer;width:100%;font-family:inherit;font-weight:500;transition:background .15s}
.btn-p:hover{background:var(--sg)}
.btn-p:disabled{background:var(--wm3);cursor:not-allowed}
.btn-g{background:none;border:1px solid var(--bd2);border-radius:var(--radius);padding:8px 14px;font-size:13px;cursor:pointer;color:var(--t2);font-family:inherit;transition:background .15s}
.btn-g:hover{background:var(--wm)}
.btn-sm{background:none;border:1px solid var(--bd);border-radius:var(--radius);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--t2);font-family:inherit}
.btn-sm:hover{background:var(--wm2)}
.btn-danger{color:#a32d2d}
.err-msg{font-size:12px;color:#a32d2d;margin-top:8px;text-align:center;min-height:18px}
.sbox{background:var(--sgl);border:1px solid var(--sg);border-radius:var(--radius);padding:1rem;text-align:center;color:var(--sgd);font-size:13px}
.app-shell{min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--sgd);color:#fff;padding:.875rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-icon{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr h1{font-size:17px;font-weight:600}
.hdr .sub{font-size:11px;opacity:.65;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:8px}
.pill-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:var(--radius);padding:5px 12px;font-size:12px;color:#fff;cursor:pointer;font-family:inherit;transition:background .15s}
.pill-btn:hover{background:rgba(255,255,255,.25)}
.tab-bar{background:var(--bg1);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;position:sticky;top:60px;z-index:9}
.tb{padding:11px 16px;font-size:13px;border:none;background:transparent;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:color .15s}
.tb.active{color:var(--sgd);border-bottom-color:var(--sgd);font-weight:600}
.tb:hover:not(.active){background:var(--wm)}
.view{display:none;padding:1.25rem 1.5rem;flex:1}.view.active{display:block}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav h2{font-size:16px;font-weight:600;color:var(--t1)}
.nav-btn{background:none;border:1px solid var(--bd);border-radius:var(--radius);padding:6px 12px;cursor:pointer;font-size:13px;color:var(--t2);font-family:inherit}
.nav-btn:hover{background:var(--wm2)}
.mg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dl{text-align:center;font-size:12px;color:var(--t2);padding:6px 0;font-weight:600}
.dc{min-height:72px;background:var(--bg1);border:1px solid var(--bd);border-radius:5px;padding:5px}
.dc.om{background:var(--wm);opacity:.5}
.dc.td .dn{background:var(--sgd);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.dn{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.ep{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--sgl);color:var(--sgd);border-left:2px solid var(--sg);transition:background .12s}
.ep:hover{background:var(--sg);color:#fff}
.ep.full{background:#fef2f2;color:#a32d2d;border-left-color:#a32d2d}
.ep.full:hover{background:#a32d2d;color:#fff}
.ep.open{background:var(--bg2);color:var(--t2);border-left:2px dashed var(--wm3);font-style:italic}
.ep.open:hover{background:var(--wm2);color:var(--t1)}
.wscroll{overflow-x:auto}
.wg{display:grid;grid-template-columns:60px repeat(7,1fr);border:1px solid var(--bd);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg1);min-width:520px}
.wh{background:var(--sgd);color:#fff;padding:8px 4px;text-align:center;font-size:11px;font-weight:600}
.wh.today-col{background:var(--sg)}
.ts{font-size:10px;color:var(--t2);padding:4px 6px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);height:44px;display:flex;align-items:flex-start}
.wc{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);height:44px;padding:2px}
.we{font-size:10px;padding:2px 4px;border-radius:3px;cursor:pointer;border-left:2px solid var(--sg);background:var(--sgl);color:var(--sgd);line-height:1.3;transition:background .12s}
.we:hover{background:var(--sg);color:#fff}
.we.full{background:#fef2f2;color:#a32d2d;border-left-color:#a32d2d}
.we.full:hover{background:#a32d2d;color:#fff}
.we.open{background:var(--bg2);color:var(--t2);border-left:2px dashed var(--wm3);font-style:italic}
.we.open:hover{background:var(--wm2);color:var(--t1)}
.mo-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.mo-overlay.open{display:flex}
.mo-card{background:var(--bg1);border-radius:var(--radius-lg);padding:1.5rem;width:420px;max-width:100%;position:relative;margin:auto}
.mo-card h3{font-size:16px;font-weight:600;color:var(--sgd);margin-bottom:4px}
.mo-meta{font-size:12px;color:var(--t2);padding-bottom:.875rem;margin-bottom:.875rem;border-bottom:1px solid var(--bd)}
.mo-x{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--t2);font-size:20px;line-height:1;padding:4px}
.cap-bar{height:5px;background:var(--wm2);border-radius:3px;margin:6px 0 4px;overflow:hidden}
.cap-fill{height:100%;background:var(--sg);border-radius:3px}
.cap-fill.warn{background:#d97706}.cap-fill.full{background:#a32d2d}
.eprev{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:.875rem;font-size:12px;color:var(--t2);margin-top:10px;line-height:1.8}
.eprev strong{color:var(--t1);font-weight:600}
.acard{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:14px}
.acard h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--t1)}
.ig2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}
.bsage{background:var(--sgl);color:var(--sgd)}
.bopen{background:#f0f0f0;color:var(--t2)}
.bfull{background:#fef2f2;color:#a32d2d}
.crow{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--wm);border-radius:var(--radius);font-size:12px;margin-bottom:6px}
.crow:last-child{margin-bottom:0}
.dot{width:8px;height:8px;border-radius:50%;background:var(--sg);flex-shrink:0}
.dot.open{background:var(--wm3);border:1px dashed var(--t2)}
.brow{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--bg2);border-radius:var(--radius);font-size:12px;margin-bottom:5px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.scard{background:var(--bg2);border-radius:var(--radius);padding:1rem;text-align:center}
.scard .num{font-size:24px;font-weight:700;color:var(--sgd)}
.scard .lbl{font-size:11px;color:var(--t2);margin-top:3px}
.itag{font-size:10px;background:var(--wm2);border-radius:4px;padding:2px 6px;color:var(--t2);white-space:nowrap}
.section-hdr{font-size:12px;font-weight:600;color:var(--sgd);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px}
.name-tag{display:inline-flex;align-items:center;gap:6px;background:var(--sgl);border:1px solid var(--sg);border-radius:var(--radius);padding:5px 11px;font-size:13px;color:var(--sgd)}
.name-tag button{background:none;border:none;cursor:pointer;color:var(--sgd);font-size:15px;line-height:1;padding:0 0 0 2px}
.name-tag button:hover{color:#a32d2d}
.names-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;margin-bottom:4px}
.add-name-row{display:flex;gap:8px;margin-top:10px}
.add-name-row input{flex:1;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--radius);font-size:13px;background:var(--bg1);color:var(--t1);font-family:inherit}
.add-name-row input:focus{outline:none;border-color:var(--sg)}
.add-name-row button{padding:8px 14px;background:var(--sgd);color:#fff;border:none;border-radius:var(--radius);font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}
.add-name-row button:hover{background:var(--sg)}
.hint{font-size:11px;color:var(--t2);margin-top:6px;line-height:1.6}
.msg-ok{font-size:12px;color:var(--sgd);margin-top:7px}
.msg-err{font-size:12px;color:#a32d2d;margin-top:7px}
.auth-badge{font-size:11px;padding:3px 8px;border-radius:4px;margin-left:6px}
.auth-ok{background:#e8f0ea;color:var(--sgd)}
.info-box{background:#e8f4fd;border:1px solid #b3d4f0;border-radius:var(--radius);padding:10px 14px;font-size:12px;color:#1a5a8a;margin-bottom:14px;line-height:1.6}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t2);font-size:16px;padding:2px}
@media(max-width:600px){
  .hdr{padding:.75rem 1rem}
  .view{padding:1rem}
  .sgrid{grid-template-columns:repeat(3,1fr)}
  .ig2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root">

<div class="page" id="page-login">
<div class="login-wrap">
<div class="login-card">
  <div style="text-align:center;margin-bottom:1.5rem">
    <div class="logo-circle">🌿</div>
    <div style="font-size:22px;font-weight:600;color:var(--t1)">揪你瑜珈</div>
    <div style="font-size:13px;color:var(--sgd);margin-top:3px;font-weight:500">後台管理系統</div>
    <div style="font-size:12px;color:var(--t2);margin-top:3px">請登入以管理時段與預約</div>
  </div>
  <div class="fg">
    <label>帳號（Email）</label>
    <input type="email" id="lu" placeholder="your@email.com" autocomplete="username">
  </div>
  <div class="fg">
    <label>密碼</label>
    <div class="pw-wrap">
      <input type="password" id="lp" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" onclick="togglePw()" title="顯示/隱藏密碼">👁</button>
    </div>
  </div>
  <button class="btn-p" id="login-btn" onclick="doLogin()">🔐 登入後台</button>
  <div id="lerr" class="err-msg"></div>
  <div style="border-top:1px solid var(--bd);margin-top:1.25rem;padding-top:1rem;text-align:center">
    <button class="btn-g" style="width:100%;font-size:13px" onclick="goStu()">📅 前往學生預約頁面</button>
  </div>
</div>
</div>
</div>

<div class="page active" id="page-student">
<div class="app-shell">
  <div class="hdr">
    <div class="hdr-brand">
      <div class="hdr-icon">🌿</div>
      <div><h1>揪你瑜珈</h1><div class="sub">線上課程預約系統</div></div>
    </div>
    <div class="hdr-r">
      <button class="pill-btn" id="stu-back-to-admin-btn" style="display:none;" onclick="backToAdmin()">⚙️ 返回後台</button>
      <button class="pill-btn" id="stu-login-btn" onclick="goLogin()">🔒 教師登入</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tb active" id="stab-month" onclick="sTab('month')">📅 月行事曆</button>
    <button class="tb" id="stab-week" onclick="sTab('week')">🗓 周行事曆</button>
  </div>
  <div class="view active" id="sv-month">
    <div class="cal-nav">
      <button class="nav-btn" onclick="chM(-1)">‹ 上個月</button>
      <h2 id="mtitle"></h2>
      <button class="nav-btn" onclick="chM(1)">下個月 ›</button>
    </div>
    <div class="mg" id="mgrid"></div>
    <div style="display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--t2);flex-wrap:wrap">
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--bg2);border-left:2px dashed var(--wm3);border-radius:2px;margin-right:4px;vertical-align:middle"></span>可預約課程</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--sgl);border-left:2px solid var(--sg);border-radius:2px;margin-right:4px;vertical-align:middle"></span>已有課程</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#fef2f2;border-left:2px solid #a32d2d;border-radius:2px;margin-right:4px;vertical-align:middle"></span>名額已滿</span>
    </div>
  </div>
  <div class="view" id="sv-week">
    <div class="cal-nav">
      <button class="nav-btn" onclick="chW(-1)">‹ 上週</button>
      <h2 id="wtitle"></h2>
      <button class="nav-btn" onclick="chW(1)">下週 ›</button>
    </div>
    <div class="wscroll"><div class="wg" id="wgrid"></div></div>
  </div>
</div>
</div>

<div class="page" id="page-admin">
<div class="app-shell">
  <div class="hdr">
    <div class="hdr-brand">
      <div class="hdr-icon">🌿</div>
      <div><h1>揪你瑜珈</h1><div class="sub">後台管理系統</div></div>
    </div>
    <div class="hdr-r">
      <span style="font-size:12px;opacity:.8" id="admin-lbl"></span>
      <span class="auth-badge auth-ok" id="auth-status">🔒 已驗證</span>
      <button class="pill-btn" onclick="doLogout()">登出</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tb active" id="atab-ov" onclick="aTab('ov')">📊 總覽</button>
    <button class="tb" id="atab-names" onclick="aTab('names')">🏷 課程類型</button>
    <button class="tb" id="atab-add" onclick="aTab('add')">➕ 新增時段</button>
    <button class="tb" id="atab-cs" onclick="aTab('cs')">📋 時段管理</button>
    <button class="tb" id="atab-bk" onclick="aTab('bk')">👥 預約紀錄</button>
  </div>
  <div class="view active" id="av-ov"></div>
  <div class="view" id="av-names">
    <div class="acard">
      <h3>🏷 課程類型管理</h3>
      <div style="font-size:13px;color:var(--t2);margin-bottom:14px;line-height:1.6">
        在這裡設定可供學生選擇的課程類型。學生預約時會從這個清單中選擇想上的課。
      </div>
      <div class="section-hdr">目前課程類型</div>
      <div class="names-wrap" id="names-wrap"></div>
      <div class="add-name-row">
        <input type="text" id="new-name-input" placeholder="輸入新課程類型，例：熱瑜珈" onkeydown="if(event.key==='Enter')addCourseName()">
        <button onclick="addCourseName()">＋ 新增</button>
      </div>
      <div class="hint">＊ 刪除課程類型不會影響已建立的預約紀錄</div>
      <div id="names-msg"></div>
    </div>
  </div>
  <div class="view" id="av-add">
    <div class="info-box">
      💡 <strong>新邏輯說明：</strong>後台只需建立「時段」（日期、時間、人數、負責老師），不需要指定課程名稱。第一個預約的學生會選擇課程類型，行事曆就會顯示該課程名稱。
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start;" class="ig2">
      <div class="acard" style="margin-bottom: 0;">
        <h3>➕ 新增開放時段</h3>
        <div class="ig2">
          <div class="fg"><label>上課日期 ＊</label><input type="date" id="nc-date"></div>
          <div class="fg"><label>上課時間 ＊</label><input type="time" id="nc-time"></div>
        </div>
        <div class="fg"><label>人數上限 ＊</label><input type="number" id="nc-cap" min="1" max="50" value="4"></div>
        
        <div style="border-top:1px solid var(--bd);padding-top:14px;margin-top:4px">
          <div class="section-hdr">負責老師資訊</div>
          
          <div class="fg" style="margin-bottom: 16px; background: var(--bg2); padding: 10px; border-radius: var(--radius); border: 1px dashed var(--wm3);">
            <label style="color: var(--sgd); font-weight: 600;">📋 快速代入已存老師資料</label>
            <div style="display: flex; gap: 8px; align-items: center; margin-top: 4px;">
              <select id="teacher-select" onchange="selectTeacher(this.value)" style="flex: 1;">
                <option value="">-- 請選擇老師 --</option>
              </select>
              <button class="btn-sm btn-danger" onclick="deleteTeacherRecord()" style="padding: 8px 10px; height: 36px;" title="從記憶中刪除此老師">🗑️ 刪除</button>
            </div>
          </div>

          <div class="fg"><label>老師姓名 ＊</label><input type="text" id="nc-teacher" placeholder="例：Amber老師"></div>
          <div class="fg"><label>老師 Email ＊ <span style="font-weight:400;color:var(--t2)">（有人預約時自動通知）</span></label><input type="email" id="nc-email" placeholder="sempiternalclass@gmail.com"></div>
        </div>
        <button class="btn-p" id="add-slot-btn" onclick="addSlot()">新增時段</button>
        <div id="add-msg" style="margin-top:8px"></div>
      </div>

      <div class="acard" style="margin-bottom: 0;">
        <h3>📅 現有時段預覽 (點擊 📋 可快速複製資料)</h3>
        <div style="max-height: 480px; overflow-y: auto; padding-right: 4px;" id="add-page-slots-list">
        </div>
      </div>
    </div>
  </div>
  <div class="view" id="av-cs"></div>
  <div class="view" id="av-bk"></div>
</div>
</div>

<div class="mo-overlay" id="modal" onclick="closeMoOuter(event)">
<div class="mo-card">
  <button class="mo-x" onclick="closeMo()">✕</button>
  <h3 id="mo-title"></h3>
  <div class="mo-meta" id="mo-meta"></div>
  <div id="mo-body"></div>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc,
  addDoc, setDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

function gwStart(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()-d.getDay()); }
function dStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function nowTs(){
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

  } catch(e) {
    const msgs={'auth/invalid-email':'帳號格式錯誤','auth/user-not-found':'帳號不存在','auth/wrong-password':'密碼錯誤','auth/invalid-credential':'帳號或密碼錯誤','auth/too-many-requests':'嘗試次數過多，請稍後再試'};

function initListeners(){
  unsubAll();
  unsubSlots = onSnapshot(query(colSlots, orderBy("date")), snap=>{
    slots = snap.docs.map(d=>({id:d.id,...d.data()}));
    refreshCals();
    if(document.getElementById('av-ov').classList.contains('active')) renderOv();
    if(document.getElementById('av-cs').classList.contains('active')) renderCS();
    if(typeof renderAddPageSlots === 'function') renderAddPageSlots();
  });
  unsubBookings = onSnapshot(query(colBookings, orderBy("ts","desc")), snap=>{
    bookings = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(document.getElementById('av-ov').classList.contains('active')) renderOv();
    if(document.getElementById('av-bk').classList.contains('active')) renderBK();
  });
  unsubSettings = onSnapshot(doc(db,"settings","courseNames"), snap=>{
    if(snap.exists()){ courseNames=snap.data().list||[]; }
    else { const d=['基礎瑜珈','進階瑜珈','低空瑜珈','空中瑜珈','瑜珈輪','紓壓放鬆瑜珈']; setDoc(doc(db,"settings","courseNames"),{list:d}); courseNames=d; }
    if(document.getElementById('av-names').classList.contains('active')) renderNames();
  });
  
  // 新增：監聽老師清單設定
  unsubTeachers = onSnapshot(doc(db,"settings","teachers"), snap=>{
    if(snap.exists()){ teachers=snap.data().list||[]; }
    else { teachers=[]; }
    updateTeacherSelect();
  });
}

window.deleteTeacherRecord = async function(){
  const sel = document.getElementById('teacher-select');
  if(!sel || sel.value === "") { alert('請先選擇想刪除的老師'); return; }
  const idx = parseInt(sel.value);
  const target = teachers[idx];
  if(!confirm(`確定要將「${target.name}」從快速選單中移除嗎？`)) return;
  
  const newList = teachers.filter((_, i)=>i !== idx);
  await setDoc(doc(db,"settings","teachers"), {list: newList});
  document.getElementById('nc-teacher').value = '';
  document.getElementById('nc-email').value = '';
};

window.addSlot = async function(){
  const date=document.getElementById('nc-date').value;
  const time=document.getElementById('nc-time').value;
  const cap=parseInt(document.getElementById('nc-cap').value)||10;
  const teacher=document.getElementById('nc-teacher').value.trim();
  const email=document.getElementById('nc-email').value.trim();
  const msg=document.getElementById('add-msg');
  if(!date||!time||!teacher||!email){ msg.className='msg-err'; msg.textContent='請填寫所有必填欄位（＊）'; return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ msg.className='msg-err'; msg.textContent='Email 格式不正確'; return; }
  const btn=document.getElementById('add-slot-btn');
  btn.disabled=true; btn.textContent='儲存中…';
  try {
    // 儲存時段到資料庫
    await addDoc(colSlots,{name:'', date, time, cap, booked:0, teacher, email});
    
    // 新增：儲存或自動更新老師清單（避免重複）
    const isExist = teachers.some(t => t.name === teacher && t.email === email);
    if(!isExist){
      const newList = [...teachers, {name: teacher, email: email}];
      await setDoc(doc(db,"settings","teachers"), {list: newList});
    }

    msg.className='';
    msg.innerHTML=`<div class="sbox">✓ 時段已新增！${date} ${time} · ${teacher}</div>`;
    document.getElementById('nc-date').value='';
    document.getElementById('nc-time').value='';
    document.getElementById('nc-cap').value='10';
    document.getElementById('nc-teacher').value='';
    document.getElementById('nc-email').value='';
    
    // 重設教師下拉選單到預設狀態
    if(document.getElementById('teacher-select')) document.getElementById('teacher-select').value = "";

    setTimeout(()=>{ msg.innerHTML=''; },3500);
  } catch(e){ msg.className='msg-err'; msg.textContent='儲存失敗：'+e.message; }
  btn.disabled=false; btn.textContent='新增時段';
};

// ── 渲染新增時段頁面右側的行事曆清單 ──
function renderAddPageSlots() {
  const el = document.getElementById('add-page-slots-list');
  if (!el) return;
  
  if (!slots.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--t2);padding:8px">目前尚無任何開放時段</div>';
    return;
  }

  // 將時段依照日期、時間排序
  let sorted = [...slots].sort((a, b) => {
    const dComp = a.date.localeCompare(b.date);
    return dComp !== 0 ? dComp : a.time.localeCompare(b.time);
  });

  let html = '';
  sorted.forEach(s => {
    const label = s.name || '可預約課程';
    html += `
      <div class="crow" style="margin-bottom: 8px; justify-content: space-between; align-items: center; background: var(--bg2); padding: 10px; border-radius: var(--radius); border: 1px solid var(--bd);">
        <div style="flex: 1; min-width: 0; padding-right: 8px;">
          <div style="font-weight: 600; font-size: 13px; color: var(--sgd);">
            📅 ${s.date} <span style="color: var(--t1); margin-left:6px;">⏰ ${s.time}</span>
          </div>
          <div style="font-size: 12px; color: var(--t2); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
            ${label} · 老師: ${s.teacher} · 名額: ${s.booked}/${s.cap}
          </div>
        </div>
        <button class="btn-sm" onclick="window.copySlotToForm('${s.id}')" style="border: 1px solid var(--sg); color: var(--sgd); font-weight: 600; background: var(--bg1); cursor: pointer; padding: 4px 8px; border-radius: 4px; white-space: nowrap;">📋 複製</button>
      </div>
    `;
  });
  el.innerHTML = html;
}

// ── 點擊複製按鈕：自動填入左側表單 ──
window.copySlotToForm = function(sid) {
  const s = slots.find(x => x.id === sid);
  if (!s) return;

  document.getElementById('nc-date').value = s.date;
  document.getElementById('nc-time').value = s.time;
  document.getElementById('nc-cap').value = s.cap;
  document.getElementById('nc-teacher').value = s.teacher;
  document.getElementById('nc-email').value = s.email;

  // 觸發原始代碼中可能有的老師選擇連動
  const selectEl = document.getElementById('teacher-select');
  if (selectEl) {
    let matchedValue = "";
    for (let i = 0; i < selectEl.options.length; i++) {
      if (selectEl.options[i].text.includes(s.teacher)) {
        matchedValue = selectEl.options[i].value;
        break;
      }
    }
    selectEl.value = matchedValue;
  }

  const msg = document.getElementById('add-msg');
  if (msg) {
    msg.className = 'msg-ok';
    msg.innerHTML = `<div class="sbox" style="background:#e8f0ea; color:var(--sgd); border:1px solid var(--sg); padding:8px; border-radius:4px;">✓ 已成功複製 ${s.date} ${s.time} 的時段設定，修改日期或時間後即可直接新增！</div>`;
    setTimeout(() => { msg.innerHTML = ''; }, 4000);
  }
};

    <button class="btn-g" style="border-color:var(--sg); color:var(--sgd); font-weight:600; display:flex; align-items:center; gap:4px; padding:10px 16px;" onclick="goStu()">

  slots.slice(0,6).forEach(s=>{
    const f=s.booked>=s.cap;

    const isOpen=!s.name;
    html+=`<div class="crow"><div class="dot${isOpen?' open':''}"></div><div style="flex:1"><div style="font-weight:600">${label}${isOpen?' <span style="font-size:10px;color:var(--t2);font-weight:400">（等待學生選擇）</span>':''}</div><div style="font-size:11px;color:var(--t2)">${s.date} ${s.time} · ${s.teacher}</div></div><span class="badge ${isOpen?'bopen':f?'bfull':'bsage'}">${isOpen?'開放中':s.booked+'/'+s.cap}</span></div>`;
  });

  html+=`</div><div class="acard"><h3>最新預約</h3>`;

window.delBk = async function(bid){
  const b = bookings.find(x=>x.id===bid);
  if(!b) return;
  if(!confirm(`確定要刪除學生「${b.name}」的這筆預約紀錄嗎？\n系統將會自動扣除該時段的預約人數。`)) return;
  
  try {
    // 1. 刪除預約紀錄
    await deleteDoc(doc(db, "bookings", bid));
    
    // 2. 找到對應的時段並將人數減 1
    const s = slots.find(x=>x.id === b.slotId);
    if(s){
      const newBooked = Math.max(0, s.booked - 1);
      const updateData = { booked: newBooked };
      // 如果扣到 0 人，時段名稱自動變回空白
      if(newBooked === 0) {
        updateData.name = ''; 
      }
      await updateDoc(doc(db, "slots", b.slotId), updateData);
    }
    alert('預約已成功刪除');
  } catch(e) {
    alert('刪除失敗：' + e.message);
  }
};

// ── 開啟編輯預約彈出視窗 ──
window.openEditBk = function(bid){

  if(!b) return;

  document.getElementById('mo-meta').textContent = `預約 ID: ${bid}`;
  
  const nameOpts = courseNames.map(n=>`<option${n===b.courseName?' selected':''}>${n}</option>`).join('');
  
  document.getElementById('mo-body').innerHTML = `
    <div class="fg"><label>學生姓名</label><input type="text" id="ebk-n" value="${b.name}"></div>
    <div class="fg"><label>手機號碼</label><input type="tel" id="ebk-p" value="${b.phone}" maxlength="10"></div>
    <div class="fg"><label>預約課程</label><select id="ebk-c">${nameOpts}</select></div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:12px;background:var(--bg2);padding:8px;border-radius:4px;">
      ℹ️ 此預約綁定於時段：${b.date} ${b.time} (${b.teacher})，不可跨時段移動。
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-g" onclick="closeMo()">取消</button>
      <button class="btn-p" id="save-ebk-btn" onclick="window.saveEditBk('${bid}')" style="margin-top:0">儲存修改</button>
    </div>

// ── 儲存修改後的預約紀錄 ──
window.saveEditBk = async function(bid){
  const b = bookings.find(x=>x.id===bid);
  if(!b) return;
  
  const newName = document.getElementById('ebk-n').value.trim();
  const newPhone = document.getElementById('ebk-p').value.trim();
  const newCourse = document.getElementById('ebk-c').value;
  const msg = document.getElementById('ebk-msg');
  const btn = document.getElementById('save-ebk-btn');
  
  if(!newName || !newPhone){
    msg.className = 'msg-err'; msg.textContent = '請填寫所有欄位'; return;
  }
  if(!/^09\d{8}$/.test(newPhone.replace(/-/g,''))){
    msg.className = 'msg-err'; msg.textContent = '手機格式錯誤，須為 10 碼數字'; return;
  }
  
  btn.disabled = true; btn.textContent = '儲存中…';
  
  try {
    // 1. 更新預約紀錄
    await updateDoc(doc(db, "bookings", bid), {
      name: newName,
      phone: newPhone.replace(/-/g,''),
      courseName: newCourse
    });
    
    // 2. 連動更新時段的顯示名稱
    const s = slots.find(x=>x.id === b.slotId);
    if(s && (!s.name || s.name === b.courseName)) {
      await updateDoc(doc(db, "slots", b.slotId), { name: newCourse });
    }
    
    closeMo();
  } catch(e){
    msg.className = 'msg-err';
    msg.textContent = '儲存失敗：' + e.message;
    btn.disabled = false; btn.textContent = '儲存修改';
  }
};

function renderMonth(){
  document.getElementById('mtitle').textContent=`${curM.getFullYear()} 年 ${MW[curM.getMonth()]}`;
  const g=document.getElementById('mgrid'); g.innerHTML='';
  DW.forEach(d=>{ const el=document.createElement('div');el.className='dl';el.textContent='週'+d;g.appendChild(el); });
  const fd=new Date(curM.getFullYear(),curM.getMonth(),1).getDay();
  const dim=new Date(curM.getFullYear(),curM.getMonth()+1,0).getDate();
  const pd=new Date(curM.getFullYear(),curM.getMonth(),0).getDate();
  for(let i=0;i<fd;i++){ const el=document.createElement('div');el.className='dc om';const n=document.createElement('div');n.className='dn';n.textContent=pd-fd+1+i;el.appendChild(n);g.appendChild(el); }
  for(let d=1;d<=dim;d++){
    const ds=`${curM.getFullYear()}-${String(curM.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el=document.createElement('div');el.className='dc';
    if(TODAY.getFullYear()===curM.getFullYear()&&TODAY.getMonth()===curM.getMonth()&&TODAY.getDate()===d) el.classList.add('td');
    const nd=document.createElement('div');nd.className='dn';nd.textContent=d;el.appendChild(nd);
    
    slots.filter(s=>s.date===ds)
         .sort((a, b) => a.time.localeCompare(b.time))
         .forEach(s=>{
           const f=s.booked>=s.cap;
           const isOpen=!s.name;
           const p=document.createElement('div');
           p.className='ep'+(isOpen?' open':f?' full':'');
           p.textContent=s.time+' '+(isOpen?'可預約課程':s.name);
           p.title=isOpen?`${s.time} 可預約課程（${s.teacher}）`:`${s.name} (${s.teacher})`;
           p.onclick=()=>openBook(s); el.appendChild(p);
         });
    g.appendChild(el);
  }
  const rem=7-((fd+dim)%7);
  if(rem<7) for(let i=1;i<=rem;i++){ const el=document.createElement('div');el.className='dc om';const n=document.createElement('div');n.className='dn';n.textContent=i;el.appendChild(n);g.appendChild(el); }
}

function renderWeek(){
  const we=new Date(curWS);we.setDate(we.getDate()+6);
  const fmt=d=>(d.getMonth()+1)+'/'+d.getDate();
  document.getElementById('wtitle').textContent=`${curWS.getFullYear()} 年 ${fmt(curWS)} – ${fmt(we)}`;
  const g=document.getElementById('wgrid');g.innerHTML='';
  const c0=document.createElement('div');c0.className='wh';c0.textContent='時間';g.appendChild(c0);
  for(let i=0;i<7;i++){
    const d=new Date(curWS);d.setDate(d.getDate()+i);
    const h=document.createElement('div');h.className='wh';
    if(d.toDateString()===TODAY.toDateString()) h.classList.add('today-col');
    h.textContent='週'+DW[d.getDay()]+' '+d.getDate();g.appendChild(h);
  }
  ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'].forEach(hr=>{
    const t=document.createElement('div');t.className='ts';t.textContent=hr;g.appendChild(t);
    for(let i=0;i<7;i++){
      const d=new Date(curWS);d.setDate(d.getDate()+i);const ds=dStr(d);
      const cell=document.createElement('div');cell.className='wc';
      slots.filter(s=>s.date===ds&&s.time===hr).forEach(s=>{
        const f=s.booked>=s.cap;const isOpen=!s.name;
        const ev=document.createElement('div');ev.className='we'+(isOpen?' open':f?' full':'');
        ev.textContent=isOpen?'可預約課程':s.name;
        ev.title=isOpen?`可預約課程（${s.teacher}）`:`${s.name} (${s.teacher})`;
        ev.onclick=()=>openBook(s);cell.appendChild(ev);
      });
      g.appendChild(cell);
    }
  });
}

function openBook(s){
  const isOpen = !s.name;
  const full   = s.booked>=s.cap;
  const pct    = s.cap>0 ? Math.min(Math.round(s.booked/s.cap*100),100) : 0;
  const fc     = pct>=100?'full':pct>=75?'warn':'';
  const displayName = isOpen ? '可預約課程' : s.name;

  document.getElementById('mo-title').textContent = displayName;
  document.getElementById('mo-meta').innerHTML=
    `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px;font-size:13px"><span>📅 ${s.date}</span><span>🕐 ${s.time}</span><span>👤 ${s.teacher}</span></div>`+
    (isOpen
      ? `<div style="font-size:12px;color:var(--sgd);background:var(--sgl);padding:6px 10px;border-radius:6px">✨ 此時段尚無人預約，你選擇的課程將決定這個時段的課程名稱！</div>`
      : `<div class="cap-bar"><div class="cap-fill ${fc}" style="width:${pct}%"></div></div><div style="font-size:12px;color:var(--t2)">名額：${s.booked} / ${s.cap}${full?' <span style="color:#a32d2d;font-weight:600">（額滿）</span>':''}</div>`
    );

  if(full){
    document.getElementById('mo-body').innerHTML=`<div style="text-align:center;padding:2rem 0;color:var(--t2)"><div style="font-size:36px;margin-bottom:10px">🚫</div><div style="font-size:15px;font-weight:600;color:#a32d2d">此課程名額已滿</div><div style="font-size:13px;margin-top:6px">請回到行事曆選擇其他時段</div><button class="btn-g" style="margin-top:16px" onclick="closeMo()">關閉</button></div>`;
  } else {
    const courseOpts = isOpen
      ? courseNames.map(n=>`<option value="${n}">${n}</option>`).join('')
      : `<option value="${s.name}" selected>${s.name}</option>`;
    const courseSelectDisabled = !isOpen ? 'disabled' : '';
    const courseLabel = isOpen ? '請選擇課程 ＊（你是第一位，請選擇想上的課）' : '課程名稱';

    document.getElementById('mo-body').innerHTML=
      `<div class="fg"><label>您的姓名 ＊</label><input type="text" id="bk-n" placeholder="請輸入姓名"></div>`+
      `<div class="fg"><label>${courseLabel}</label><select id="bk-course" ${courseSelectDisabled}>${courseOpts}</select></div>`+
      `<div class="fg"><label>手機號碼 ＊ <span style="font-weight:400;color:var(--t2)">格式：09xxxxxxxx</span></label><input type="tel" id="bk-p" placeholder="0912345678" maxlength="10"></div>`+
      `<div style="display:flex;gap:8px;margin-top:4px"><button class="btn-g" onclick="closeMo()">取消</button><button class="btn-p" id="bk-submit-btn" onclick="window.submitBk('${s.id}')" style="margin-top:0">✓ 確認預約</button></div>`+
      `<div id="bk-err"></div>`;
  }
  openMo();
}

window.submitBk = async function(sid){
  const name  = (document.getElementById('bk-n')?.value||'').trim();
  const phone = (document.getElementById('bk-p')?.value||'').trim().replace(/-/g,'');
  const chosenCourse = document.getElementById('bk-course')?.value||'';
  const err   = document.getElementById('bk-err');

  if(!name||!phone){ if(err){err.className='msg-err';err.textContent='請填寫所有必填欄位';} return; }
  if(!/^09\d{8}$/.test(phone)){ if(err){err.className='msg-err';err.textContent='手機格式錯誤，請輸入 09xxxxxxxx（共 10 碼）';} return; }
  if(!chosenCourse){ if(err){err.className='msg-err';err.textContent='請選擇課程';} return; }

  const s=slots.find(x=>x.id===sid);
  if(!s||s.booked>=s.cap){ if(err){err.className='msg-err';err.textContent='此時段已額滿';} return; }

  const btn=document.getElementById('bk-submit-btn');
  btn.disabled=true; btn.textContent='預約中…';

  try {
    await addDoc(colBookings,{
      name, phone,
      slotId:     s.id,
      courseName: chosenCourse,
      date:       s.date,
      time:       s.time,
      teacher:    s.teacher,
      email:      s.email,
      ts:         nowTs()
    });
    const updateData = { booked: s.booked+1 };
    if(!s.name) updateData.name = chosenCourse;  
    await updateDoc(doc(db,"slots",s.id), updateData);

    document.getElementById('mo-body').innerHTML=
      `<div class="sbox" style="padding:1.5rem"><div style="font-size:36px;margin-bottom:10px">✅</div><div style="font-weight:700;font-size:16px;margin-bottom:6px">預約成功！</div><div style="font-size:13px">${name} 已預約 <strong>${chosenCourse}</strong></div><div style="font-size:12px;margin-top:4px;opacity:.8">${s.date} ${s.time}</div></div>`+
      `<div class="eprev"><div style="font-size:12px;font-weight:600;color:var(--sgd);margin-bottom:8px">✉️ 系統已自動寄送通知信給負責老師</div><div><strong>收件人：</strong>${s.teacher}（${s.email}）</div><div><strong>主旨：</strong>【揪你瑜珈・新預約通知】${chosenCourse} – ${s.date} ${s.time}</div><div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)">${s.teacher}，您好：<br>揪你瑜珈的時段有新學生預約。<br>課程：${chosenCourse}<br>學生姓名：${name}<br>手機：${phone}<br>時間：${s.date} ${s.time}<br>目前人數：${s.booked+1} / ${s.cap}</div></div>`+
      `<button class="btn-g" style="margin-top:12px;width:100%" onclick="closeMo()">關閉</button>`;
  } catch(e){
    if(err){err.className='msg-err';err.textContent='預約失敗：'+e.message;}
    btn.disabled=false; btn.textContent='✓ 確認預約';
  }
};

function openMo(){ document.getElementById('modal').classList.add('open'); }
function closeMo(){ document.getElementById('modal').classList.remove('open'); }
window.closeMo=closeMo;
window.closeMoOuter=function(e){ if(e.target===document.getElementById('modal')) closeMo(); };
window.chM=function(d){ curM.setMonth(curM.getMonth()+d); renderMonth(); };
window.chW=function(d){ curWS.setDate(curWS.getDate()+d*7); renderWeek(); };

// 預設啟動畫面改為學生預約頁面，並加載基礎即時監聽與月曆數據
window.goStu();
</script>
