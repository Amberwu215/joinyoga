<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>揪你瑜珈 · 線上預約系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;background:#f5f0e8;color:#1a1a1a;font-size:15px}
:root{
  --sg:#4a7c59;--sgl:#e8f0ea;--sgm:#7fa88a;--sgd:#2d5a3d;
  --wm:#f5f0e8;--wm2:#ede5d8;--wm3:#d4c9b5;
  --t1:#1a1a1a;--t2:#6b7280;
  --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.18);
  --bg1:#ffffff;--bg2:#f9f7f4;
  --radius:8px;--radius-lg:12px
}
.page{display:none}.page.active{display:block}
/* ── Login ── */
.login-wrap{background:var(--wm);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius-lg);padding:2rem;width:380px;max-width:100%}
.logo-circle{width:58px;height:58px;background:var(--sgd);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:#fff;font-size:26px}
.login-tabs{display:flex;border:1px solid var(--bd);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem}
.login-tab{flex:1;padding:9px;font-size:13px;border:none;background:transparent;cursor:pointer;color:var(--t2);font-family:inherit;transition:all .15s;font-weight:500}
.login-tab.active{background:var(--sgd);color:#fff}
/* ── Forms ── */
.fg{margin-bottom:12px}
.fg label{font-size:12px;color:var(--t2);display:block;margin-bottom:4px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1px solid var(--bd);border-radius:var(--radius);font-size:14px;background:var(--bg1);color:var(--t1);font-family:inherit;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--sg);box-shadow:0 0 0 3px rgba(74,124,89,.12)}
.btn-p{background:var(--sgd);color:#fff;border:none;border-radius:var(--radius);padding:10px 20px;font-size:14px;cursor:pointer;width:100%;font-family:inherit;font-weight:500;transition:background .15s}
.btn-p:hover{background:var(--sg)}
.btn-p:disabled{background:var(--wm3);cursor:not-allowed}
.btn-g{background:none;border:1px solid var(--bd2);border-radius:var(--radius);padding:8px 14px;font-size:13px;cursor:pointer;color:var(--t2);font-family:inherit;transition:background .15s}
.btn-g:hover{background:var(--wm)}
.btn-sm{background:none;border:1px solid var(--bd);border-radius:var(--radius);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--t2);font-family:inherit}
.btn-sm:hover{background:var(--wm2)}
.btn-danger{color:#a32d2d}
.err-msg{font-size:12px;color:#a32d2d;margin-top:8px;text-align:center;min-height:18px}
.sbox{background:var(--sgl);border:1px solid var(--sg);border-radius:var(--radius);padding:1rem;text-align:center;color:var(--sgd);font-size:13px}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t2);font-size:16px;padding:2px}
/* ── App Shell ── */
.app-shell{min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--sgd);color:#fff;padding:.875rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-icon{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr h1{font-size:17px;font-weight:600}
.hdr .sub{font-size:11px;opacity:.65;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:var(--radius);padding:5px 12px;font-size:12px;color:#fff;cursor:pointer;font-family:inherit;transition:background .15s}
.pill-btn:hover{background:rgba(255,255,255,.25)}
.tab-bar{background:var(--bg1);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;position:sticky;top:60px;z-index:9}
.tb{padding:11px 16px;font-size:13px;border:none;background:transparent;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:color .15s}
.tb.active{color:var(--sgd);border-bottom-color:var(--sgd);font-weight:600}
.tb:hover:not(.active){background:var(--wm)}
.view{display:none;padding:1.25rem 1.5rem;flex:1}.view.active{display:block}
/* ── Calendar ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav h2{font-size:16px;font-weight:600;color:var(--t1)}
.nav-btn{background:none;border:1px solid var(--bd);border-radius:var(--radius);padding:6px 12px;cursor:pointer;font-size:13px;color:var(--t2);font-family:inherit}
.nav-btn:hover{background:var(--wm2)}
.mg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dl{text-align:center;font-size:12px;color:var(--t2);padding:6px 0;font-weight:600}
.dc{min-height:72px;background:var(--bg1);border:1px solid var(--bd);border-radius:5px;padding:5px}
.dc.om{background:var(--wm);opacity:.5}
.dc.td .dn{background:var(--sgd);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.dn{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.ep{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--sgl);color:var(--sgd);border-left:2px solid var(--sg);transition:background .12s}
.ep:hover{background:var(--sg);color:#fff}
.ep.full{background:#fef2f2;color:#a32d2d;border-left-color:#a32d2d}
.ep.full:hover{background:#a32d2d;color:#fff}
.ep.open{background:var(--bg2);color:var(--t2);border-left:2px dashed var(--wm3);font-style:italic}
.ep.open:hover{background:var(--wm2);color:var(--t1)}
.wscroll{overflow-x:auto}
.wg{display:grid;grid-template-columns:60px repeat(7,1fr);border:1px solid var(--bd);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg1);min-width:520px}
.wh{background:var(--sgd);color:#fff;padding:8px 4px;text-align:center;font-size:11px;font-weight:600}
.wh.today-col{background:var(--sg)}
.ts{font-size:10px;color:var(--t2);padding:4px 6px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);height:44px;display:flex;align-items:flex-start}
.wc{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);height:44px;padding:2px}
.we{font-size:10px;padding:2px 4px;border-radius:3px;cursor:pointer;border-left:2px solid var(--sg);background:var(--sgl);color:var(--sgd);line-height:1.3;transition:background .12s}
.we:hover{background:var(--sg);color:#fff}
.we.full{background:#fef2f2;color:#a32d2d;border-left-color:#a32d2d}
.we.full:hover{background:#a32d2d;color:#fff}
.we.open{background:var(--bg2);color:var(--t2);border-left:2px dashed var(--wm3);font-style:italic}
.we.open:hover{background:var(--wm2);color:var(--t1)}
/* ── 新增時段頁 內嵌行事曆 ── */
.add-cal-tabs{display:flex;gap:0;margin-bottom:10px;border:1px solid var(--bd);border-radius:var(--radius);overflow:hidden}
.add-cal-tab{flex:1;padding:7px;font-size:12px;border:none;background:transparent;cursor:pointer;color:var(--t2);font-family:inherit;transition:all .15s;font-weight:500}
.add-cal-tab.active{background:var(--sgd);color:#fff}
.mini-mg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mini-dl{text-align:center;font-size:10px;color:var(--t2);padding:4px 0;font-weight:600}
.mini-dc{min-height:52px;background:var(--bg1);border:1px solid var(--bd);border-radius:3px;padding:3px}
.mini-dc.om{background:var(--wm);opacity:.4}
.mini-dc.td .mini-dn{background:var(--sgd);color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px}
.mini-dn{font-size:10px;font-weight:600;color:var(--t1);margin-bottom:2px;width:16px;height:16px;display:flex;align-items:center;justify-content:center}
.mini-ep{font-size:9px;padding:1px 3px;border-radius:2px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--sgl);color:var(--sgd);border-left:2px solid var(--sg)}
.mini-ep.open{background:var(--bg2);color:var(--t2);border-left:2px dashed var(--wm3);font-style:italic}
.mini-ep.full{background:#fef2f2;color:#a32d2d;border-left-color:#a32d2d}
.mini-wg{display:grid;grid-template-columns:44px repeat(7,1fr);border:1px solid var(--bd);border-radius:var(--radius);overflow:hidden;background:var(--bg1);min-width:360px}
.mini-wh{background:var(--sgd);color:#fff;padding:5px 2px;text-align:center;font-size:10px;font-weight:600}
.mini-wh.today-col{background:var(--sg)}
.mini-ts{font-size:9px;color:var(--t2);padding:2px 4px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);height:34px;display:flex;align-items:flex-start}
.mini-wc{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);height:34px;padding:1px}
.mini-we{font-size:9px;padding:1px 2px;border-radius:2px;border-left:2px solid var(--sg);background:var(--sgl);color:var(--sgd);line-height:1.2}
.mini-we.open{background:var(--bg2);color:var(--t2);border-left:2px dashed var(--wm3);font-style:italic}
.mini-we.full{background:#fef2f2;color:#a32d2d;border-left-color:#a32d2d}
/* ── Modal ── */
.mo-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.mo-overlay.open{display:flex}
.mo-card{background:var(--bg1);border-radius:var(--radius-lg);padding:1.5rem;width:440px;max-width:100%;position:relative;margin:auto}
.mo-card h3{font-size:16px;font-weight:600;color:var(--sgd);margin-bottom:4px}
.mo-meta{font-size:12px;color:var(--t2);padding-bottom:.875rem;margin-bottom:.875rem;border-bottom:1px solid var(--bd)}
.mo-x{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--t2);font-size:20px;line-height:1;padding:4px}
.cap-bar{height:5px;background:var(--wm2);border-radius:3px;margin:6px 0 4px;overflow:hidden}
.cap-fill{height:100%;background:var(--sg);border-radius:3px}
.cap-fill.warn{background:#d97706}.cap-fill.full{background:#a32d2d}
.eprev{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:.875rem;font-size:12px;color:var(--t2);margin-top:10px;line-height:1.8}
.eprev strong{color:var(--t1);font-weight:600}
/* ── Admin Cards ── */
.acard{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:14px}
.acard h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--t1)}
.ig2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ig3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}
.bsage{background:var(--sgl);color:var(--sgd)}
.bopen{background:#f0f0f0;color:var(--t2)}
.bfull{background:#fef2f2;color:#a32d2d}
/* ── 時段管理列 - 字放大 ── */
.crow{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--wm);border-radius:var(--radius);font-size:13px;margin-bottom:8px;border:1px solid transparent}
.crow:last-child{margin-bottom:0}
.crow:hover{border-color:var(--bd2);background:var(--wm2)}
.crow-name{font-weight:700;font-size:14px;color:var(--t1)}
.crow-dt{font-size:13px;color:var(--sgd);font-weight:600;margin-top:3px}
.crow-sub{font-size:11px;color:var(--t2);margin-top:2px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--sg);flex-shrink:0}
.dot.open{background:var(--wm3);border:2px dashed var(--t2)}
.brow{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border-radius:var(--radius);font-size:13px;margin-bottom:6px;border:1px solid transparent}
.brow:hover{border-color:var(--bd2)}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.scard{background:var(--bg2);border-radius:var(--radius);padding:1rem;text-align:center}
.scard .num{font-size:24px;font-weight:700;color:var(--sgd)}
.scard .lbl{font-size:11px;color:var(--t2);margin-top:3px}
.itag{font-size:11px;background:var(--wm2);border-radius:4px;padding:2px 7px;color:var(--t2);white-space:nowrap}
.section-hdr{font-size:12px;font-weight:600;color:var(--sgd);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px}
.name-tag{display:inline-flex;align-items:center;gap:6px;background:var(--sgl);border:1px solid var(--sg);border-radius:var(--radius);padding:5px 11px;font-size:13px;color:var(--sgd)}
.name-tag button{background:none;border:none;cursor:pointer;color:var(--sgd);font-size:15px;line-height:1;padding:0 0 0 2px}
.name-tag button:hover{color:#a32d2d}
.names-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;margin-bottom:4px}
.add-name-row{display:flex;gap:8px;margin-top:10px}
.add-name-row input{flex:1;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--radius);font-size:13px;background:var(--bg1);color:var(--t1);font-family:inherit}
.add-name-row input:focus{outline:none;border-color:var(--sg)}
.add-name-row button{padding:8px 14px;background:var(--sgd);color:#fff;border:none;border-radius:var(--radius);font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}
.add-name-row button:hover{background:var(--sg)}
.hint{font-size:11px;color:var(--t2);margin-top:6px;line-height:1.6}
.msg-ok{font-size:12px;color:var(--sgd);margin-top:7px}
.msg-err{font-size:12px;color:#a32d2d;margin-top:7px}
.auth-badge{font-size:11px;padding:3px 8px;border-radius:4px}
.auth-ok{background:#e8f0ea;color:var(--sgd)}
.info-box{background:#e8f4fd;border:1px solid #b3d4f0;border-radius:var(--radius);padding:10px 14px;font-size:12px;color:#1a5a8a;margin-bottom:14px;line-height:1.6}
/* ── 學生帳號管理 ── */
.student-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.student-card:hover{border-color:var(--bd2)}
.student-name{font-size:14px;font-weight:700;color:var(--t1)}
.student-meta{font-size:12px;color:var(--t2);margin-top:3px}
.student-quota{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.quota-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--sgl);color:var(--sgd);font-weight:600}
.quota-tag.used{background:var(--wm2);color:var(--t2)}
@media(max-width:600px){
  .hdr{padding:.75rem 1rem}
  .view{padding:1rem}
  .sgrid{grid-template-columns:repeat(3,1fr)}
  .ig2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root">

<!-- ══ 登入頁（含學生註冊）══ -->
<div class="page active" id="page-login">
<div class="login-wrap">
<div class="login-card">
  <div style="text-align:center;margin-bottom:1.25rem">
    <div class="logo-circle">🌿</div>
    <div style="font-size:22px;font-weight:600;color:var(--t1)">揪你瑜珈</div>
  </div>
  <div class="login-tabs">
    <button class="login-tab active" id="ltab-admin" onclick="switchLoginTab('admin')">🔐 教師登入</button>
    <button class="login-tab" id="ltab-student" onclick="switchLoginTab('student')">🧘 學生登入</button>
  </div>

  <!-- 教師登入 / 註冊 -->
  <div id="login-admin-form">
    <!-- 子分頁：登入 / 申請帳號 -->
    <div style="display:flex;border:1px solid var(--bd);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem">
      <button id="tltab-login" onclick="switchTeacherTab('login')"
        style="flex:1;padding:8px;font-size:13px;border:none;background:var(--sgd);color:#fff;cursor:pointer;font-family:inherit;font-weight:500">登入</button>
      <button id="tltab-reg" onclick="switchTeacherTab('reg')"
        style="flex:1;padding:8px;font-size:13px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;font-weight:500">申請教師帳號</button>
    </div>
    <!-- 教師登入表單 -->
    <div id="teacher-login-section">
      <div class="fg"><label>Email</label><input type="email" id="lu" placeholder="your@email.com" autocomplete="username"></div>
      <div class="fg"><label>密碼</label>
        <div class="pw-wrap">
          <input type="password" id="lp" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
          <button class="pw-toggle" onclick="togglePw('lp')">👁</button>
        </div>
      </div>
      <button class="btn-p" id="login-btn" onclick="doLogin()">🔐 登入後台</button>
      <div id="lerr" class="err-msg"></div>
    </div>
    <!-- 教師申請帳號表單（需主管理者審核）-->
    <div id="teacher-reg-section" style="display:none">
      <div style="background:var(--sgl);border:1px solid var(--sg);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--sgd);margin-bottom:12px;line-height:1.6">
        📋 申請送出後，需由<strong>主管理者審核</strong>才能使用後台功能。審核通過後你會收到 Email 通知。
      </div>
      <div class="fg"><label>姓名 ＊</label><input type="text" id="treg-name" placeholder="請輸入真實姓名"></div>
      <div class="fg"><label>Email ＊</label><input type="email" id="treg-email" placeholder="your@email.com"></div>
      <div class="fg"><label>手機 ＊</label><input type="tel" id="treg-phone" placeholder="09xxxxxxxx" maxlength="10"></div>
      <div class="fg"><label>密碼 ＊（至少 6 碼）</label>
        <div class="pw-wrap">
          <input type="password" id="treg-pw" placeholder="••••••••">
          <button class="pw-toggle" onclick="togglePw('treg-pw')">👁</button>
        </div>
      </div>
      <button class="btn-p" id="treg-btn" onclick="doTeacherRegister()">📩 送出申請</button>
      <div id="treg-msg" class="err-msg"></div>
    </div>
  </div>

  <!-- 學生登入 / 註冊 -->
  <div id="login-student-form" style="display:none">
    <!-- 子分頁切換 -->
    <div style="display:flex;border:1px solid var(--bd);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem">
      <button id="sltab-login" onclick="switchStuTab('login')"
        style="flex:1;padding:8px;font-size:13px;border:none;background:var(--sgd);color:#fff;cursor:pointer;font-family:inherit;font-weight:500">登入</button>
      <button id="sltab-reg" onclick="switchStuTab('reg')"
        style="flex:1;padding:8px;font-size:13px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;font-weight:500">註冊新帳號</button>
    </div>
    <!-- 學生登入表單 -->
    <div id="stu-login-section">
      <div class="fg"><label>手機號碼</label><input type="tel" id="slu-phone" placeholder="09xxxxxxxx" maxlength="10"></div>
      <div class="fg"><label>密碼</label>
        <div class="pw-wrap">
          <input type="password" id="slu-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doStuLogin()">
          <button class="pw-toggle" onclick="togglePw('slu-pw')">👁</button>
        </div>
      </div>
      <button class="btn-p" id="slu-btn" onclick="doStuLogin()">🧘 學生登入</button>
      <div id="slu-err" class="err-msg"></div>
      <div style="text-align:center;margin-top:10px">
        <button class="btn-g" style="font-size:12px;width:100%" onclick="goStu()">📅 不登入，直接前往預約行事曆</button>
      </div>
    </div>
    <!-- 學生註冊表單 -->
    <div id="stu-reg-section" style="display:none">
      <div class="fg"><label>姓名 ＊</label><input type="text" id="reg-name" placeholder="請輸入真實姓名"></div>

const SUPER_ADMIN_EMAIL='sempiternalclass@gmail.com';

const DW=['日','一','二','三','四','五','六'];
const MW=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const TODAY=new Date();
let curM=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
let curWS=gwStart(TODAY);
let addCalM=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
let addCalWS=gwStart(TODAY);

function gwStart(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate()-d.getDay());}
function dStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function nowTs(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}

// ── 頁面 ──
function showPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');}

// ── 教師登入 ──
window.doLogin=async function(){
  const email=document.getElementById('lu').value.trim();
  const pass=document.getElementById('lp').value;
  const err=document.getElementById('lerr');
  const btn=document.getElementById('login-btn');
  if(!email||!pass){err.textContent='請輸入帳號和密碼';return;}
  btn.disabled=true;btn.textContent='登入中…';err.textContent='';
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){
    const msgs={'auth/invalid-email':'帳號格式錯誤','auth/user-not-found':'帳號不存在','auth/wrong-password':'密碼錯誤','auth/invalid-credential':'帳號或密碼錯誤','auth/too-many-requests':'嘗試次數過多，請稍後再試'};
    err.textContent=msgs[e.code]||('登入失敗：'+e.message);
    btn.disabled=false;btn.textContent='🔐 登入後台';
  }
};

// ── 教師申請帳號 ──
window.doTeacherRegister=async function(){
  const name=document.getElementById('treg-name').value.trim();
  const email=document.getElementById('treg-email').value.trim();
  const phone=document.getElementById('treg-phone').value.trim().replace(/-/g,'');
  const pw=document.getElementById('treg-pw').value;
  const msg=document.getElementById('treg-msg');
  const btn=document.getElementById('treg-btn');
  if(!name||!email||!phone||!pw){msg.className='msg-err';msg.textContent='請填寫所有欄位';return;}
  if(!/^09\d{8}$/.test(phone)){msg.className='msg-err';msg.textContent='手機格式錯誤，請輸入 09xxxxxxxx';return;}
  if(pw.length<6){msg.className='msg-err';msg.textContent='密碼至少 6 碼';return;}
  btn.disabled=true;btn.textContent='送出中…';msg.textContent='';
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pw);
    await setDoc(doc(db,'teacherAccounts',cred.user.uid),{
      name,email,phone,
      status:'pending',  // pending=待審核, approved=已核准, rejected=已拒絕
      role:'teacher',
      createdAt:nowTs()
    });
    await signOut(auth); // 申請後先登出，等待審核
    msg.className='msg-ok';
    msg.textContent='✅ 申請已送出！待主管理者審核後即可登入。';
    btn.disabled=false;btn.textContent='📩 送出申請';
  }catch(e){
    const msgs={'auth/email-already-in-use':'此 Email 已被使用','auth/weak-password':'密碼強度不足','auth/invalid-email':'Email 格式錯誤'};
    msg.className='msg-err';msg.textContent=msgs[e.code]||('申請失敗：'+e.message);
    btn.disabled=false;btn.textContent='📩 送出申請';
  }
};

// ── 學生登入（用手機號碼查出 Email，再用 Firebase Auth 登入）──
window.doStuLogin=async function(){
  const phone=(document.getElementById('slu-phone').value||'').trim().replace(/-/g,'');
  const pw=document.getElementById('slu-pw').value;
  const err=document.getElementById('slu-err');
  const btn=document.getElementById('slu-btn');
  if(!phone||!pw){err.className='msg-err';err.textContent='請填寫手機號碼和密碼';return;}
  if(!/^09\d{8}$/.test(phone)){err.className='msg-err';err.textContent='手機格式錯誤，請輸入 09xxxxxxxx';return;}
  btn.disabled=true;btn.textContent='登入中…';err.textContent='';
  try{
    // 從 Firestore 查詢對應的 Email
    const {getDocs,query,collection,where}=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    const q=query(collection(db,"students"),where("phone","==",phone));
    const snap=await getDocs(q);
    if(snap.empty){err.className='msg-err';err.textContent='找不到此手機號碼的帳號，請先註冊';btn.disabled=false;btn.textContent='🧘 學生登入';return;}
    const stuData=snap.docs[0].data();
    const stuId=snap.docs[0].id;
    // 用 Email + 密碼登入 Firebase Auth
    const {signInWithEmailAndPassword}=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
    await signInWithEmailAndPassword(auth,stuData.email,pw);
    // 登入後標記為學生（非管理員）
    isAdmin=false;
    currentStudentId=stuId;
    currentStudentName=stuData.name;
    document.getElementById('stu-name-label').textContent='👋 '+stuData.name;
    document.getElementById('stu-student-login-btn').style.display='none';
    document.getElementById('stu-student-logout-btn').style.display='inline-block';
    document.getElementById('stu-login-btn').style.display='inline-block';
    goStu();
  }catch(e){
    const msgs={'auth/wrong-password':'密碼錯誤','auth/invalid-credential':'手機號碼或密碼錯誤','auth/too-many-requests':'嘗試次數過多，請稍後再試'};
    err.className='msg-err';err.textContent=msgs[e.code]||('登入失敗：'+e.message);
    btn.disabled=false;btn.textContent='🧘 學生登入';
  }
};

  if(pw.length<6){msg.className='msg-err';msg.textContent='密碼至少 6 碼';return;}
  btn.disabled=true;btn.textContent='註冊中…';msg.textContent='';
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pw);
    // 寫入學生資料到 Firestore
    await setDoc(doc(db,"students",cred.user.uid),{
      name,email,phone,
      totalQuota:0,  // 老師後台設定可上堂數（0=未設定）
      usedQuota:0,   // 已上堂數
      allowedCourses:[],  // 老師設定可上的課程類型（空=全部）
      createdAt:nowTs()
    });
    msg.className='msg-ok';msg.textContent='✅ 註冊成功！正在前往預約頁面…';
    setTimeout(()=>{goStu();},1200);
  }catch(e){
    const msgs={'auth/email-already-in-use':'此 Email 已被註冊','auth/weak-password':'密碼強度不足，請使用 6 碼以上','auth/invalid-email':'Email 格式錯誤'};
    msg.className='msg-err';msg.textContent=msgs[e.code]||('註冊失敗：'+e.message);
    btn.disabled=false;btn.textContent='✅ 註冊學生帳號';

};

// ── Auth 狀態 ──
onAuthStateChanged(auth,async user=>{
  if(user){
    // 1. 先檢查是否為學生
    try{
      const stuSnap=await getDoc(doc(db,"students",user.uid));
      if(stuSnap.exists()){
        const d=stuSnap.data();
        currentRole='student';isAdmin=false;
        currentStudentId=user.uid;currentStudentName=d.name||'';
        document.getElementById('stu-name-label').textContent=d.name?'👋 '+d.name:'';
        document.getElementById('stu-student-login-btn').style.display='none';
        document.getElementById('stu-student-logout-btn').style.display='inline-block';
        startPublicListeners();showPage('student');sTab('month');
        return;
      }
    }catch(e){}
    // 2. 再檢查是否為教師帳號
    try{
      const tchSnap=await getDoc(doc(db,"teacherAccounts",user.uid));
      if(tchSnap.exists()){
        const d=tchSnap.data();
        // 主管理者判斷：email 符合 SUPER_ADMIN_EMAIL
        const isSuperAdmin=(user.email===SUPER_ADMIN_EMAIL);
        if(isSuperAdmin){
          currentRole='superadmin';isAdmin=true;
        } else if(d.status==='approved'){
          currentRole='teacher';isAdmin=true;
        } else if(d.status==='pending'){
          // 待審核：顯示提示後登出
          await signOut(auth);
          document.getElementById('lerr').textContent='⏳ 帳號尚待主管理者審核，請稍後再嘗試登入。';
          document.getElementById('login-btn').disabled=false;
          document.getElementById('login-btn').textContent='🔐 登入後台';
          return;
        } else {
          await signOut(auth);
          document.getElementById('lerr').textContent='❌ 帳號已被拒絕，請聯絡主管理者。';
          document.getElementById('login-btn').disabled=false;
          document.getElementById('login-btn').textContent='🔐 登入後台';
          return;
        }
        setupAdminUI(user,d,currentRole);
        return;
      }
    }catch(e){}
    // 3. 既不是學生也不是教師 → 視為主管理者（第一次使用，尚未建 teacherAccounts 記錄）
    if(user.email===SUPER_ADMIN_EMAIL){
      currentRole='superadmin';isAdmin=true;
      // 自動建立主管理者記錄（若不存在）
      try{
        await setDoc(doc(db,"teacherAccounts",user.uid),{
          name:'主管理者',email:user.email,phone:'',status:'approved',role:'superadmin',createdAt:nowTs()
        },{merge:true});
      }catch(e){}
      setupAdminUI(user,{name:'主管理者'},currentRole);
      return;
    }
    // 其他不明帳號 → 登出
    await signOut(auth);
    document.getElementById('lerr').textContent='此帳號無法登入後台，請聯絡主管理者。';
    document.getElementById('login-btn').disabled=false;
    document.getElementById('login-btn').textContent='🔐 登入後台';
  } else {
    currentRole='';isAdmin=false;currentStudentId='';currentStudentName='';
    document.getElementById('stu-back-to-admin-btn').style.display='none';
    document.getElementById('stu-student-logout-btn').style.display='none';
    document.getElementById('stu-student-login-btn').style.display='inline-block';
    document.getElementById('stu-login-btn').style.display='inline-block';
  }
});

function setupAdminUI(user,data,role){
  const roleLabel=role==='superadmin'?'👑 主管理者':'👩‍🏫 教師';
  document.getElementById('admin-lbl').textContent=(data.name||user.email);
  document.getElementById('role-badge').textContent=roleLabel;
  document.getElementById('role-badge').style.background=role==='superadmin'?'#fff3cd':'#e8f0ea';
  document.getElementById('role-badge').style.color=role==='superadmin'?'#7a5500':'var(--sgd)';
  // 載入教師權限
  if(role==='teacher'&&data.permissions){
    currentPerms=data.permissions;
  } else if(role==='superadmin'){
    currentPerms={};
  } else {
    currentPerms={};
  }
  showPage('admin');
  startAdminListeners();
  applyTabVisibility();
  goFirstAvailableTab();
  document.getElementById('login-btn').disabled=false;
  document.getElementById('login-btn').textContent='🔐 登入後台';
  document.getElementById('stu-back-to-admin-btn').style.display='inline-block';
  document.getElementById('stu-login-btn').style.display='inline-block';
}

// ══ 權限系統 ══
// 五大功能 × 四種操作
const MODULES = [
  {key:'names',  label:'課程類型'},
  {key:'add',    label:'新增時段'},
  {key:'cs',     label:'時段管理'},
  {key:'bk',     label:'預約紀錄'},
  {key:'stu',    label:'學生帳號'},
];
const ACTIONS = ['view','create','edit','delete'];
const ACTION_LABELS = {view:'查看', create:'新增', edit:'修改', delete:'刪除'};

// 取得目前登入教師的權限物件
let currentPerms = {}; // e.g. {names:{view:true,create:false,...}, ...}

function can(module, action){
  if(currentRole==='superadmin') return true;
  return !!(currentPerms[module]&&currentPerms[module][action]);
}

function applyTabVisibility(){
  if(currentRole==='superadmin'){
    // 主管理者：全部顯示
    ['names','add','cs','bk','stu'].forEach(k=>{
      const el=document.getElementById('atab-'+k);
      if(el) el.style.display='';
    });
    const tchTab=document.getElementById('atab-teachers');
    if(tchTab) tchTab.style.display='';
    return;
  }
  // 教師：只顯示有 view 權限的 tab
  MODULES.forEach(m=>{
    const el=document.getElementById('atab-'+m.key);
    if(el) el.style.display=can(m.key,'view')?'':'none';
  });
  const tchTab=document.getElementById('atab-teachers');
  if(tchTab) tchTab.style.display='none';
}

// ── 後台首頁自動跳到第一個有權限的 tab ──
function goFirstAvailableTab(){
  if(currentRole==='superadmin'){aTab('ov');return;}
  const first=MODULES.find(m=>can(m.key,'view'));
  if(first) aTab(first.key); else aTab('ov');
}

function startPublicListeners(){
  if(unsubSlots) return;
  unsubSlots=onSnapshot(query(colSlots,orderBy("date")),snap=>{
    slots=snap.docs.map(d=>({id:d.id,...d.data()}));
    refreshCals();renderAddCal();
    if(document.getElementById('av-cs').classList.contains('active')) renderCS();
  });
  unsubSettings=onSnapshot(doc(db,"settings","courseNames"),snap=>{
    if(snap.exists()) courseNames=snap.data().list||[];
    else{const d=['基礎瑜珈','進階瑜珈','低空瑜珈','空中瑜珈','瑜珈輪','紓壓放鬆瑜珈'];setDoc(doc(db,"settings","courseNames"),{list:d});courseNames=d;}
    if(document.getElementById('av-names').classList.contains('active')) renderNames();
  });
}
function startAdminListeners(){
  startPublicListeners();
  if(!unsubBookings){
    unsubBookings=onSnapshot(query(colBookings,orderBy("ts","desc")),snap=>{
      bookings=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(document.getElementById('av-ov').classList.contains('active')) renderOv();
      if(document.getElementById('av-bk').classList.contains('active')) renderBK();
    });
  }
  if(!unsubTeachers){
    unsubTeachers=onSnapshot(doc(db,"settings","teachers"),snap=>{
      teachers=snap.exists()?snap.data().list||[]:[];
      updateTeacherSelect();
    });
  }
  if(!unsubStudents){
    unsubStudents=onSnapshot(query(colStudents,orderBy("createdAt","desc")),snap=>{
      students=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(document.getElementById('av-stu').classList.contains('active')) renderStudents();
    });
  }
  if(!unsubTeacherAccounts){
    const colTA=collection(db,"teacherAccounts");
    unsubTeacherAccounts=onSnapshot(query(colTA,orderBy("createdAt","desc")),snap=>{
      teacherAccounts=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(document.getElementById('av-teachers').classList.contains('active')) renderTeacherAccounts();
    });
  }
}

  if(!document.getElementById('page-student').classList.contains('active')) return;

// ── Tabs ──
window.sTab=function(n){
  document.querySelectorAll('[id^=stab-]').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('[id^=sv-]').forEach(v=>v.classList.remove('active'));
  document.getElementById('stab-'+n).classList.add('active');
  document.getElementById('sv-'+n).classList.add('active');
  if(n==='month') renderMonth(); else renderWeek();
};
window.aTab=function(n){
  document.querySelectorAll('[id^=atab-]').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('[id^=av-]').forEach(v=>v.classList.remove('active'));
  document.getElementById('atab-'+n).classList.add('active');
  document.getElementById('av-'+n).classList.add('active');
  if(n==='ov') renderOv();
  if(n==='names') renderNames();
  if(n==='add') renderAddCal();
  if(n==='cs') renderCS();
  if(n==='bk') renderBK();
  if(n==='stu') renderStudents();
  if(n==='teachers') renderTeacherAccounts();
};

  const w=document.getElementById('names-wrap');w.innerHTML='';
  if(!courseNames.length){w.innerHTML='<div style="font-size:13px;color:var(--t2)">尚無課程類型，請新增。</div>';return;}
  courseNames.forEach(nm=>{
    const t=document.createElement('div');t.className='name-tag';
    const delBtn=can('names','delete')?`<button onclick="window.delName('${nm}')">✕</button>`:'';
    t.innerHTML=`${nm}${delBtn}`;

  });

window.addCourseName=async function(){
  if(!can('names','create')){alert('您沒有新增課程類型的權限');return;}
  const v=document.getElementById('new-name-input').value.trim();
  const msg=document.getElementById('names-msg');
  if(!v){msg.className='msg-err';msg.textContent='請輸入課程名稱';return;}

window.delName=async function(nm){

  if(!confirm(`確定要刪除課程類型「${nm}」嗎？`)) return;
  await setDoc(doc(db,"settings","courseNames"),{list:courseNames.filter(x=>x!==nm)});
};

window.selectTeacher=function(val){

window.deleteTeacherRecord=async function(){

  const t=teachers[parseInt(sel.value)];

// ── 新增時段 ──
window.addSlot=async function(){
  if(!can('add','create')){alert('您沒有新增時段的權限');return;}
  const date=document.getElementById('nc-date').value;
  const time=document.getElementById('nc-time').value;
  const cap=parseInt(document.getElementById('nc-cap').value)||4;
  const teacher=document.getElementById('nc-teacher').value.trim();
  const email=document.getElementById('nc-email').value.trim();
  const msg=document.getElementById('add-msg');
  if(!date||!time||!teacher||!email){msg.className='msg-err';msg.textContent='請填寫所有必填欄位（＊）';return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){msg.className='msg-err';msg.textContent='Email 格式不正確';return;}
  const btn=document.getElementById('add-slot-btn');btn.disabled=true;btn.textContent='儲存中…';
  try{
    await addDoc(colSlots,{name:'',date,time,cap,booked:0,teacher,email});
    const exists=teachers.some(t=>t.name===teacher&&t.email===email);
    if(!exists) await setDoc(doc(db,"settings","teachers"),{list:[...teachers,{name:teacher,email}]});
    msg.className='';msg.innerHTML=`<div class="sbox">✓ 時段已新增！${date} ${time} · ${teacher}</div>`;
    document.getElementById('nc-date').value='';document.getElementById('nc-time').value='';
    document.getElementById('nc-cap').value='4';document.getElementById('nc-teacher').value='';
    document.getElementById('nc-email').value='';
    if(document.getElementById('teacher-select')) document.getElementById('teacher-select').value='';
    setTimeout(()=>{msg.innerHTML='';},3500);
    renderAddCal();
  }catch(e){msg.className='msg-err';msg.textContent='儲存失敗：'+e.message;}
  btn.disabled=false;btn.textContent='新增時段';
};

window.switchAddCal=function(mode){
  addCalMode=mode;
  document.getElementById('add-cal-tab-month').classList.toggle('active',mode==='month');
  document.getElementById('add-cal-tab-week').classList.toggle('active',mode==='week');

  document.getElementById('add-cal-week').style.display=mode==='week'?'block':'none';

window.addCalChM=function(d){addCalM.setMonth(addCalM.getMonth()+d);renderAddCalMonth();};
window.addCalChW=function(d){addCalWS.setDate(addCalWS.getDate()+d*7);renderAddCalWeek();};
function renderAddCal(){if(addCalMode==='month') renderAddCalMonth(); else renderAddCalWeek();}
function renderAddCalMonth(){
  const el=document.getElementById('add-mgrid');if(!el) return;
  document.getElementById('add-mtitle').textContent=`${addCalM.getFullYear()} 年 ${MW[addCalM.getMonth()]}`;
  el.innerHTML='';
  DW.forEach(d=>{const e=document.createElement('div');e.className='mini-dl';e.textContent='週'+d;el.appendChild(e);});
  const fd=new Date(addCalM.getFullYear(),addCalM.getMonth(),1).getDay();
  const dim=new Date(addCalM.getFullYear(),addCalM.getMonth()+1,0).getDate();
  const pd=new Date(addCalM.getFullYear(),addCalM.getMonth(),0).getDate();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='mini-dc om';const n=document.createElement('div');n.className='mini-dn';n.textContent=pd-fd+1+i;e.appendChild(n);el.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const ds=`${addCalM.getFullYear()}-${String(addCalM.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const e=document.createElement('div');e.className='mini-dc';
    if(TODAY.getFullYear()===addCalM.getFullYear()&&TODAY.getMonth()===addCalM.getMonth()&&TODAY.getDate()===d) e.classList.add('td');
    const nd=document.createElement('div');nd.className='mini-dn';nd.textContent=d;e.appendChild(nd);
    slots.filter(s=>s.date===ds).sort((a,b)=>a.time.localeCompare(b.time)).forEach(s=>{
      const f=s.booked>=s.cap;const isOpen=!s.name;
      const p=document.createElement('div');p.className='mini-ep'+(isOpen?' open':f?' full':'');
      p.textContent=s.time+' '+(isOpen?'開放':s.name.slice(0,4));e.appendChild(p);
    });
    el.appendChild(e);
  }
  const rem=7-((fd+dim)%7);
  if(rem<7) for(let i=1;i<=rem;i++){const e=document.createElement('div');e.className='mini-dc om';const n=document.createElement('div');n.className='mini-dn';n.textContent=i;e.appendChild(n);el.appendChild(e);}
}
function renderAddCalWeek(){
  const el=document.getElementById('add-wgrid');if(!el) return;
  const we=new Date(addCalWS);we.setDate(we.getDate()+6);
  const fmt=d=>(d.getMonth()+1)+'/'+d.getDate();
  document.getElementById('add-wtitle').textContent=`${fmt(addCalWS)} – ${fmt(we)}`;
  el.innerHTML='';
  const c0=document.createElement('div');c0.className='mini-wh';c0.textContent='時間';el.appendChild(c0);
  for(let i=0;i<7;i++){
    const d=new Date(addCalWS);d.setDate(d.getDate()+i);
    const h=document.createElement('div');h.className='mini-wh';
    if(d.toDateString()===TODAY.toDateString()) h.classList.add('today-col');
    h.textContent='週'+DW[d.getDay()]+' '+d.getDate();el.appendChild(h);
  }
  ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'].forEach(hr=>{
    const t=document.createElement('div');t.className='mini-ts';t.textContent=hr;el.appendChild(t);
    for(let i=0;i<7;i++){
      const d=new Date(addCalWS);d.setDate(d.getDate()+i);const ds=dStr(d);
      const cell=document.createElement('div');cell.className='mini-wc';
      slots.filter(s=>s.date===ds&&s.time===hr).forEach(s=>{
        const f=s.booked>=s.cap;const isOpen=!s.name;
        const ev=document.createElement('div');ev.className='mini-we'+(isOpen?' open':f?' full':'');
        ev.textContent=isOpen?'開放':(s.name.slice(0,3));cell.appendChild(ev);
      });
      el.appendChild(cell);
    }
  });
}

// ── 時段管理（字放大版）──
function renderCS(){
  const el=document.getElementById('av-cs');
  let html=`<div class="acard"><h3>所有時段（${slots.length} 筆）</h3>`;
  slots.forEach(s=>{
    const f=s.booked>=s.cap&&s.cap>0;const isOpen=!s.name;const label=s.name||'可預約課程';
    html+=`<div class="crow">
      <div class="dot${isOpen?' open':''}"></div>
      <div style="flex:1;min-width:0">
        <div class="crow-name">${label} <span class="itag">${s.teacher}</span></div>
        <div class="crow-dt">📅 ${s.date} &nbsp; 🕐 ${s.time}</div>
        <div class="crow-sub">${s.email}</div>
      </div>
      <span class="badge ${isOpen?'bopen':f?'bfull':'bsage'}" style="font-size:12px;padding:4px 10px">${isOpen?'開放中':s.booked+'/'+s.cap}</span>
      ${can('cs','edit')?`<button class="btn-sm" style="font-size:13px;padding:5px 12px" onclick="window.openEditSlot('${s.id}')">✎ 編輯</button>`:''}
      ${can('cs','delete')?`<button class="btn-sm btn-danger" style="font-size:13px;padding:5px 12px" onclick="window.delSlot('${s.id}')">🗑 刪除</button>`:''}
    </div>`;
  });
  if(!slots.length) html+='<div style="font-size:13px;color:var(--t2);padding:8px">尚無時段</div>';
  html+='</div>';el.innerHTML=html;
}
window.delSlot=async function(id){if(!can('cs','delete')){alert('您沒有刪除時段的權限');return;}if(!confirm('確定要刪除這個時段嗎？')) return;await deleteDoc(doc(db,"slots",id));};
window.openEditSlot=function(id){
  const s=slots.find(x=>x.id===id);if(!s) return;
  document.getElementById('mo-title').textContent='編輯時段';
  document.getElementById('mo-meta').innerHTML=`<span class="crow-dt">📅 ${s.date} &nbsp; 🕐 ${s.time}</span>`;
  const nameOpts=courseNames.map(n=>`<option${n===s.name?' selected':''}>${n}</option>`).join('');
  document.getElementById('mo-body').innerHTML=
    `<div class="fg"><label>課程名稱（可清空讓學生選）</label><select id="ec-n"><option value="">可預約課程（未定）</option>${nameOpts}</select></div>`+
    `<div class="ig2"><div class="fg"><label>日期</label><input type="date" id="ec-d" value="${s.date}"></div><div class="fg"><label>時間</label><input type="time" id="ec-t" value="${s.time}"></div></div>`+
    `<div class="ig2"><div class="fg"><label>人數上限</label><input type="number" id="ec-c" value="${s.cap}" min="1" max="50"></div><div class="fg"><label>已預約人數</label><input type="number" id="ec-b" value="${s.booked}" min="0"></div></div>`+
    `<div style="border-top:1px solid var(--bd);padding-top:12px;margin-top:4px"><div class="section-hdr">負責老師</div><div class="fg"><label>老師姓名</label><input type="text" id="ec-tc" value="${s.teacher}"></div><div class="fg"><label>老師 Email</label><input type="email" id="ec-em" value="${s.email}"></div></div>`+
    `<div style="display:flex;gap:8px"><button class="btn-g" onclick="closeMo()">取消</button><button class="btn-p" id="save-edit-btn" onclick="window.saveEditSlot('${id}')" style="margin-top:0">儲存</button></div><div id="edit-msg"></div>`;
  openMo();
};
window.saveEditSlot=async function(id){
  if(!can('cs','edit')){alert('您沒有修改時段的權限');return;}
  const btn=document.getElementById('save-edit-btn');btn.disabled=true;btn.textContent='儲存中…';
  try{
    await updateDoc(doc(db,"slots",id),{name:document.getElementById('ec-n').value,date:document.getElementById('ec-d').value,time:document.getElementById('ec-t').value,cap:parseInt(document.getElementById('ec-c').value)||1,booked:Math.max(0,parseInt(document.getElementById('ec-b').value)||0),teacher:document.getElementById('ec-tc').value,email:document.getElementById('ec-em').value});
    closeMo();
  }catch(e){document.getElementById('edit-msg').className='msg-err';document.getElementById('edit-msg').textContent='儲存失敗：'+e.message;btn.disabled=false;btn.textContent='儲存';}
};

// ── 預約紀錄 ──
function renderBK(){
  const el=document.getElementById('av-bk');
  let html=`<div class="acard"><h3>預約紀錄（${bookings.length} 筆）</h3>`;
  if(!bookings.length){html+='<div style="font-size:13px;color:var(--t2);padding:8px">尚無預約紀錄</div>';}
  else bookings.forEach(b=>{
    html+=`<div class="brow"><div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:13px">${b.name} <span style="font-size:11px;color:var(--t2)">${b.phone}</span></div>
      <div style="font-size:12px;color:var(--t2);margin-top:2px">${b.courseName} · 📅 ${b.date} 🕐 ${b.time} · 👤 ${b.teacher}</div>
    </div><span class="itag">${b.ts}</span>
    ${can('bk','edit')?`<button class="btn-sm" onclick="window.openEditBk('${b.id}')">✎</button>`:''}
    ${can('bk','delete')?`<button class="btn-sm btn-danger" onclick="window.delBk('${b.id}')">🗑</button>`:''}</div>\`;
  });
  html+='</div>';el.innerHTML=html;
}
window.delBk=async function(bid){
  if(!can('bk','delete')){alert('您沒有刪除預約的權限');return;}
  const b=bookings.find(x=>x.id===bid);if(!b) return;
  if(!confirm(`確定要刪除「${b.name}」的預約？系統將自動扣除名額。`)) return;
  try{
    await deleteDoc(doc(db,"bookings",bid));
    const s=slots.find(x=>x.id===b.slotId);
    if(s){const nb=Math.max(0,s.booked-1);const u={booked:nb};if(nb===0) u.name='';await updateDoc(doc(db,"slots",b.slotId),u);}
  }catch(e){alert('刪除失敗：'+e.message);}
};
window.openEditBk=function(bid){
  const b=bookings.find(x=>x.id===bid);if(!b) return;
  document.getElementById('mo-title').textContent='編輯預約紀錄';
  document.getElementById('mo-meta').textContent=`預約 ID: ${bid}`;
  const opts=courseNames.map(n=>`<option${n===b.courseName?' selected':''}>${n}</option>`).join('');
  document.getElementById('mo-body').innerHTML=
    `<div class="fg"><label>學生姓名</label><input type="text" id="ebk-n" value="${b.name}"></div>`+
    `<div class="fg"><label>手機號碼</label><input type="tel" id="ebk-p" value="${b.phone}" maxlength="10"></div>`+
    `<div class="fg"><label>預約課程</label><select id="ebk-c">${opts}</select></div>`+
    `<div style="font-size:11px;color:var(--t2);margin-bottom:12px;background:var(--bg2);padding:8px;border-radius:4px">ℹ️ 綁定時段：${b.date} ${b.time} (${b.teacher})</div>`+
    `<div style="display:flex;gap:8px"><button class="btn-g" onclick="closeMo()">取消</button><button class="btn-p" id="save-ebk-btn" onclick="window.saveEditBk('${bid}')" style="margin-top:0">儲存</button></div><div id="ebk-msg"></div>`;
  openMo();
};
window.saveEditBk=async function(bid){
  if(!can('bk','edit')){alert('您沒有修改預約的權限');return;}
  const b=bookings.find(x=>x.id===bid);if(!b) return;
  const name=document.getElementById('ebk-n').value.trim();
  const phone=document.getElementById('ebk-p').value.trim().replace(/-/g,'');
  const course=document.getElementById('ebk-c').value;
  const msg=document.getElementById('ebk-msg');const btn=document.getElementById('save-ebk-btn');
  if(!name||!phone){msg.className='msg-err';msg.textContent='請填寫所有欄位';return;}
  if(!/^09\d{8}$/.test(phone)){msg.className='msg-err';msg.textContent='手機格式錯誤';return;}
  btn.disabled=true;btn.textContent='儲存中…';
  try{
    await updateDoc(doc(db,"bookings",bid),{name,phone,courseName:course});
    const s=slots.find(x=>x.id===b.slotId);
    if(s&&(!s.name||s.name===b.courseName)) await updateDoc(doc(db,"slots",b.slotId),{name:course});
    closeMo();
  }catch(e){msg.className='msg-err';msg.textContent='儲存失敗：'+e.message;btn.disabled=false;btn.textContent='儲存';}
};

// ── 學生帳號管理 ──
function renderStudents(){
  const el=document.getElementById('av-stu');
  let html=`<div class="acard"><h3>🧘 學生帳號管理（${students.length} 位）</h3>
    <div style="font-size:12px;color:var(--t2);margin-bottom:12px;line-height:1.6">以下是所有已註冊的學生帳號。你可以設定每位學生的<strong>可上堂數</strong>及<strong>可上課程類型</strong>（空白代表不限制）。</div>`;
  if(!students.length){
    html+='<div style="font-size:13px;color:var(--t2);padding:8px">尚無學生帳號。學生可在登入頁面「學生預約」分頁進行註冊。</div>';
  } else {
    students.forEach(s=>{
      const courseList=s.allowedCourses&&s.allowedCourses.length?s.allowedCourses.join('、'):'不限（全部課程）';
      html+=`<div class="student-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div style="flex:1">
            <div class="student-name">${s.name}</div>
            <div class="student-meta">📧 ${s.email} &nbsp; 📱 ${s.phone||'—'}</div>
            <div class="student-meta" style="margin-top:4px">可上課程：${courseList}</div>
            <div class="student-quota">
              ${s.totalQuota>0
                ?`<span class="quota-tag">${s.usedQuota||0} / ${s.totalQuota} 堂已用</span>`
                :'<span class="quota-tag used">堂數：未設定</span>'
              }
            </div>
          </div>
          ${can('stu','edit')?`<button class="btn-sm" style="font-size:12px;padding:5px 12px;white-space:nowrap" onclick="window.openEditStudent('${s.id}')">✎ 設定</button>`:''}
        </div>
      </div>`;
    });
  }
  html+='</div>';el.innerHTML=html;
}

window.openEditStudent=function(sid){
  const s=students.find(x=>x.id===sid);if(!s) return;
  document.getElementById('mo-title').textContent='設定學生帳號';
  document.getElementById('mo-meta').innerHTML=`<strong>${s.name}</strong> &nbsp; ${s.email}`;
  const courseCheckboxes=courseNames.map(n=>{
    const checked=s.allowedCourses&&s.allowedCourses.includes(n)?'checked':'';
    return `<label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:6px;cursor:pointer">
      <input type="checkbox" value="${n}" ${checked} style="width:auto;accent-color:var(--sgd)"> ${n}
    </label>`;
  }).join('');
  document.getElementById('mo-body').innerHTML=
    `<div class="fg"><label>可上堂數（0 或空白 = 不限制）</label><input type="number" id="es-quota" value="${s.totalQuota||0}" min="0" max="999"></div>`+
    `<div class="fg"><label>可上課程類型（不勾選 = 全部開放）</label>
      <div style="background:var(--bg2);padding:10px 12px;border-radius:var(--radius);border:1px solid var(--bd);margin-top:4px">
        ${courseCheckboxes||'<div style="font-size:12px;color:var(--t2)">請先至「課程類型」頁面新增課程</div>'}
      </div>
    </div>`+
    `<div style="display:flex;gap:8px"><button class="btn-g" onclick="closeMo()">取消</button><button class="btn-p" id="save-es-btn" onclick="window.saveEditStudent('${sid}')" style="margin-top:0">儲存設定</button></div><div id="es-msg"></div>`;
  openMo();
};

window.saveEditStudent=async function(sid){
  if(!can('stu','edit')){alert('您沒有修改學生帳號的權限');return;}
  const quota=parseInt(document.getElementById('es-quota').value)||0;
  const checked=[...document.querySelectorAll('#mo-body input[type=checkbox]:checked')].map(c=>c.value);
  const btn=document.getElementById('save-es-btn');const msg=document.getElementById('es-msg');
  btn.disabled=true;btn.textContent='儲存中…';
  try{
    await updateDoc(doc(db,"students",sid),{totalQuota:quota,allowedCourses:checked});
    closeMo();
  }catch(e){msg.className='msg-err';msg.textContent='儲存失敗：'+e.message;btn.disabled=false;btn.textContent='儲存設定';}
};

function renderTeacherAccounts(){
  const el=document.getElementById('av-teachers');
  const pending=teacherAccounts.filter(t=>t.status==='pending'&&t.role!=='superadmin');
  const approved=teacherAccounts.filter(t=>t.status==='approved'&&t.role!=='superadmin');
  const rejected=teacherAccounts.filter(t=>t.status==='rejected');

  let html=`<div class="acard">
    <h3>👑 主管理者功能：教師帳號管理</h3>
    <div style="font-size:12px;color:var(--t2);margin-bottom:14px;line-height:1.6">
      審核教師申請、設定各教師的功能權限。核准後教師才可登入後台，且只能使用被授權的功能。
    </div>`;

  // 待審核
  html+=`<div class="section-hdr" style="color:#7a5500">⏳ 待審核申請（${pending.length} 筆）</div>`;
  if(!pending.length){html+='<div style="font-size:13px;color:var(--t2);padding:8px 0 12px">目前無待審核申請</div>';}
  else pending.forEach(t=>{
    html+=`<div class="crow" style="background:#fff8e1;border:1px solid #ffe082;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <div class="dot" style="background:#f0a500"></div>
      <div style="flex:1;min-width:200px">
        <div class="crow-name">${t.name}</div>
        <div class="crow-dt" style="color:#7a5500">📧 ${t.email} &nbsp; 📱 ${t.phone||'—'}</div>
        <div class="crow-sub">申請時間：${t.createdAt||'—'}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-p" style="width:auto;padding:6px 14px;font-size:12px;background:#2d5a3d" onclick="window.approveTeacher('${t.id}')">✅ 核准</button>
        <button class="btn-sm btn-danger" style="padding:6px 14px;font-size:12px" onclick="window.rejectTeacher('${t.id}')">❌ 拒絕</button>
      </div>
    </div>`;
  });

  // 已核准
  html+=`<div class="section-hdr" style="margin-top:8px">✅ 已核准教師（${approved.length} 位）</div>`;
  if(!approved.length){html+='<div style="font-size:13px;color:var(--t2);padding:8px 0 12px">尚無已核准的教師帳號</div>';}
  else approved.forEach(t=>{
    // 顯示目前權限摘要
    const p=t.permissions||{};
    const permSummary=MODULES.map(m=>{
      const ops=ACTIONS.filter(a=>p[m.key]&&p[m.key][a]);
      if(!ops.length) return `<span style="font-size:10px;background:var(--wm2);color:var(--t2);padding:1px 5px;border-radius:3px">${m.label}：無</span>`;
      return `<span style="font-size:10px;background:var(--sgl);color:var(--sgd);padding:1px 5px;border-radius:3px">${m.label}：${ops.map(a=>ACTION_LABELS[a]).join('/')}</span>`;
    }).join(' ');
    html+=`<div class="crow" style="margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <div class="dot"></div>
      <div style="flex:1;min-width:200px">
        <div class="crow-name">${t.name}</div>
        <div class="crow-dt">📧 ${t.email} &nbsp; 📱 ${t.phone||'—'}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${permSummary}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:flex-start;flex-wrap:wrap">
        <button class="btn-p" style="width:auto;padding:6px 14px;font-size:12px" onclick="window.openPermModal('${t.id}')">🔑 權限設定</button>
        <button class="btn-sm btn-danger" style="padding:6px 12px;font-size:12px" onclick="window.rejectTeacher('${t.id}')">停用</button>
      </div>
    </div>`;
  });

  // 已停用
  if(rejected.length){
    html+=`<div class="section-hdr" style="margin-top:8px;color:var(--t2)">❌ 已停用帳號（${rejected.length} 位）</div>`;
    rejected.forEach(t=>{
      html+=`<div class="crow" style="opacity:.6;margin-bottom:6px">
        <div class="dot" style="background:var(--wm3)"></div>
        <div style="flex:1"><div class="crow-name">${t.name}</div><div class="crow-dt">📧 ${t.email}</div></div>

    });
  }
  html+='</div>';
  el.innerHTML=html;
}

    <div style="background:var(--bg2);border-radius:var(--radius);padding:8px 12px;font-size:11px;color:var(--t2);margin-bottom:12px;line-height:1.6">

      <strong>修改</strong>：可編輯現有資料 &nbsp;｜&nbsp;
      <strong>刪除</strong>：可刪除資料
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-g" onclick="closeMo()">取消</button>
      <button class="btn-p" id="save-perm-btn" onclick="window.savePerms('${id}')" style="margin-top:0">💾 儲存權限</button>
    </div>
    <div id="perm-msg"></div>`;
  openMo();
};

// ── 儲存權限 ──
window.savePerms=async function(id){
  const btn=document.getElementById('save-perm-btn');
  const msg=document.getElementById('perm-msg');
  btn.disabled=true;btn.textContent='儲存中…';
  // 讀取所有 checkbox 狀態
  const perms={};
  document.querySelectorAll('#mo-body input[type=checkbox]').forEach(cb=>{
    const mod=cb.dataset.mod;const act=cb.dataset.act;
    if(!perms[mod]) perms[mod]={};
    perms[mod][act]=cb.checked;
  });
  // 如果有任何 create/edit/delete，自動補上 view
  MODULES.forEach(m=>{
    if(!perms[m.key]) perms[m.key]={};
    const mp=perms[m.key];
    if(mp.create||mp.edit||mp.delete) mp.view=true;
  });
  try{
    await updateDoc(doc(db,"teacherAccounts",id),{permissions:perms});
    msg.className='msg-ok';msg.textContent='✅ 權限已儲存！';
    setTimeout(()=>{closeMo();},1000);
  }catch(e){
    msg.className='msg-err';msg.textContent='儲存失敗：'+e.message;
    btn.disabled=false;btn.textContent='💾 儲存權限';
  }
};

};

// ── 學生月曆 ──
function renderMonth(){
  document.getElementById('mtitle').textContent=`${curM.getFullYear()} 年 ${MW[curM.getMonth()]}`;
  const g=document.getElementById('mgrid');g.innerHTML='';
  DW.forEach(d=>{const el=document.createElement('div');el.className='dl';el.textContent='週'+d;g.appendChild(el);});
  const fd=new Date(curM.getFullYear(),curM.getMonth(),1).getDay();
  const dim=new Date(curM.getFullYear(),curM.getMonth()+1,0).getDate();
  const pd=new Date(curM.getFullYear(),curM.getMonth(),0).getDate();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='dc om';const n=document.createElement('div');n.className='dn';n.textContent=pd-fd+1+i;e.appendChild(n);g.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const ds=`${curM.getFullYear()}-${String(curM.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el=document.createElement('div');el.className='dc';
    if(TODAY.getFullYear()===curM.getFullYear()&&TODAY.getMonth()===curM.getMonth()&&TODAY.getDate()===d) el.classList.add('td');
    const nd=document.createElement('div');nd.className='dn';nd.textContent=d;el.appendChild(nd);
    slots.filter(s=>s.date===ds).sort((a,b)=>a.time.localeCompare(b.time)).forEach(s=>{
      const f=s.booked>=s.cap;const isOpen=!s.name;
      const p=document.createElement('div');p.className='ep'+(isOpen?' open':f?' full':'');
      p.textContent=s.time+' '+(isOpen?'可預約課程':s.name);
      p.title=isOpen?`${s.time} 可預約課程（${s.teacher}）`:`${s.name} (${s.teacher})`;
      p.onclick=()=>openBook(s);el.appendChild(p);
    });
    g.appendChild(el);
  }
  const rem=7-((fd+dim)%7);
  if(rem<7) for(let i=1;i<=rem;i++){const e=document.createElement('div');e.className='dc om';const n=document.createElement('div');n.className='dn';n.textContent=i;e.appendChild(n);g.appendChild(e);}
}

// ── 學生週曆 ──
function renderWeek(){
  const we=new Date(curWS);we.setDate(we.getDate()+6);
  const fmt=d=>(d.getMonth()+1)+'/'+d.getDate();
  document.getElementById('wtitle').textContent=`${curWS.getFullYear()} 年 ${fmt(curWS)} – ${fmt(we)}`;
  const g=document.getElementById('wgrid');g.innerHTML='';
  const c0=document.createElement('div');c0.className='wh';c0.textContent='時間';g.appendChild(c0);
  for(let i=0;i<7;i++){const d=new Date(curWS);d.setDate(d.getDate()+i);const h=document.createElement('div');h.className='wh';if(d.toDateString()===TODAY.toDateString()) h.classList.add('today-col');h.textContent='週'+DW[d.getDay()]+' '+d.getDate();g.appendChild(h);}
  ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'].forEach(hr=>{
    const t=document.createElement('div');t.className='ts';t.textContent=hr;g.appendChild(t);
    for(let i=0;i<7;i++){
      const d=new Date(curWS);d.setDate(d.getDate()+i);const ds=dStr(d);
      const cell=document.createElement('div');cell.className='wc';
      slots.filter(s=>s.date===ds&&s.time===hr).forEach(s=>{
        const f=s.booked>=s.cap;const isOpen=!s.name;
        const ev=document.createElement('div');ev.className='we'+(isOpen?' open':f?' full':'');
        ev.textContent=isOpen?'可預約課程':s.name;ev.title=isOpen?`可預約課程（${s.teacher}）`:`${s.name}`;
        ev.onclick=()=>openBook(s);cell.appendChild(ev);
      });
      g.appendChild(cell);
    }
  });
}

// ── 預約 Modal ──
function openBook(s){
  const isOpen=!s.name;const full=s.booked>=s.cap&&s.cap>0;
  const pct=s.cap>0?Math.min(Math.round(s.booked/s.cap*100),100):0;
  const fc=pct>=100?'full':pct>=75?'warn':'';
  document.getElementById('mo-title').textContent=isOpen?'可預約課程':s.name;
  document.getElementById('mo-meta').innerHTML=
    `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px;font-size:13px"><span>📅 ${s.date}</span><span>🕐 ${s.time}</span><span>👤 ${s.teacher}</span></div>`+
    (isOpen?`<div style="font-size:12px;color:var(--sgd);background:var(--sgl);padding:6px 10px;border-radius:6px">✨ 此時段尚無人預約，你選擇的課程將決定這個時段的課程名稱！</div>`
    :`<div class="cap-bar"><div class="cap-fill ${fc}" style="width:${pct}%"></div></div><div style="font-size:12px;color:var(--t2)">名額：${s.booked} / ${s.cap}${full?' <span style="color:#a32d2d;font-weight:600">（額滿）</span>':''}</div>`);
  if(full){
    document.getElementById('mo-body').innerHTML=`<div style="text-align:center;padding:2rem 0;color:var(--t2)"><div style="font-size:36px;margin-bottom:10px">🚫</div><div style="font-size:15px;font-weight:600;color:#a32d2d">此課程名額已滿</div><div style="font-size:13px;margin-top:6px">請回行事曆選擇其他時段</div><button class="btn-g" style="margin-top:16px" onclick="closeMo()">關閉</button></div>`;
  } else {
    const courseOpts=isOpen?courseNames.map(n=>`<option value="${n}">${n}</option>`).join(''):`<option value="${s.name}" selected>${s.name}</option>`;
    document.getElementById('mo-body').innerHTML=
      `<div class="fg"><label>您的姓名 ＊</label><input type="text" id="bk-n" placeholder="請輸入姓名"></div>`+
      `<div class="fg"><label>${isOpen?'請選擇課程 ＊（你是第一位，請選擇想上的課）':'課程名稱'}</label><select id="bk-course" ${!isOpen?'disabled':''}>${courseOpts}</select></div>`+
      `<div class="fg"><label>手機號碼 ＊ <span style="font-weight:400;color:var(--t2)">格式：09xxxxxxxx</span></label><input type="tel" id="bk-p" placeholder="0912345678" maxlength="10"></div>`+
      `<div style="display:flex;gap:8px;margin-top:4px"><button class="btn-g" onclick="closeMo()">取消</button><button class="btn-p" id="bk-submit-btn" onclick="window.submitBk('${s.id}')" style="margin-top:0">✓ 確認預約</button></div><div id="bk-err"></div>`;
  }
  openMo();
}
window.submitBk=async function(sid){
  const name=(document.getElementById('bk-n')?.value||'').trim();
  const phone=(document.getElementById('bk-p')?.value||'').trim().replace(/-/g,'');
  const course=document.getElementById('bk-course')?.value||'';
  const err=document.getElementById('bk-err');
  if(!name||!phone){if(err){err.className='msg-err';err.textContent='請填寫所有必填欄位';}return;}
  if(!/^09\d{8}$/.test(phone)){if(err){err.className='msg-err';err.textContent='手機格式錯誤，請輸入 09xxxxxxxx';}return;}
  if(!course){if(err){err.className='msg-err';err.textContent='請選擇課程';}return;}
  const s=slots.find(x=>x.id===sid);
  if(!s||s.booked>=s.cap&&s.cap>0){if(err){err.className='msg-err';err.textContent='此時段已額滿';}return;}
  const btn=document.getElementById('bk-submit-btn');btn.disabled=true;btn.textContent='預約中…';
  try{
    await addDoc(colBookings,{name,phone,slotId:s.id,courseName:course,date:s.date,time:s.time,teacher:s.teacher,email:s.email,ts:nowTs()});
    const upd={booked:s.booked+1};if(!s.name) upd.name=course;
    await updateDoc(doc(db,"slots",s.id),upd);
    document.getElementById('mo-body').innerHTML=
      `<div class="sbox" style="padding:1.5rem"><div style="font-size:36px;margin-bottom:10px">✅</div><div style="font-weight:700;font-size:16px;margin-bottom:6px">預約成功！</div><div style="font-size:13px">${name} 已預約 <strong>${course}</strong></div><div style="font-size:12px;margin-top:4px;opacity:.8">${s.date} ${s.time}</div></div>`+
      `<div class="eprev"><div style="font-size:12px;font-weight:600;color:var(--sgd);margin-bottom:8px">✉️ 通知信已自動寄送給負責老師</div><div><strong>收件人：</strong>${s.teacher}（${s.email}）</div><div><strong>主旨：</strong>【揪你瑜珈】${course} – ${s.date} ${s.time}</div><div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)">${s.teacher}，您好：<br>課程「${course}」有新學生預約。<br>學生：${name}｜手機：${phone}<br>時間：${s.date} ${s.time}<br>人數：${s.booked+1} / ${s.cap}</div></div>`+
      `<button class="btn-g" style="margin-top:12px;width:100%" onclick="closeMo()">關閉</button>`;
  }catch(e){if(err){err.className='msg-err';err.textContent='預約失敗：'+e.message;}btn.disabled=false;btn.textContent='✓ 確認預約';}
};

function openMo(){document.getElementById('modal').classList.add('open');}
function closeMo(){document.getElementById('modal').classList.remove('open');}
window.closeMo=closeMo;
window.closeMoOuter=function(e){if(e.target===document.getElementById('modal'))closeMo();};
window.chM=function(d){curM.setMonth(curM.getMonth()+d);renderMonth();};
window.chW=function(d){curWS.setDate(curWS.getDate()+d*7);renderWeek();};

// ── 啟動 ──
startPublicListeners();
goStu();
</script>
</body>
</html>
